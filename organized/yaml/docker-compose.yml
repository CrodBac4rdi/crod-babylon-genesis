version: '3.8'

services:
  # ELIXIR BLOCKCHAIN CORE - DAS GEHIRN
  crod-brain:
    build: ./elixir-blockchain
    container_name: crod-brain
    environment:
      - NODE_NAME=crod@brain
      - COOKIE=crod_ultimativ_2025
      - PORT=4000
    ports:
      - "4000:4000"
    volumes:
      - crod-data:/data
      - ./88-parameters.json:/app/88-parameters.json
    networks:
      - crod-net

  # N8N - WORKFLOW AUTOMATION
  n8n:
    image: n8nio/n8n
    container_name: crod-n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_PORT=5678
      - WEBHOOK_URL=http://crod-brain:4000/webhooks
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - crod-net

  # PHOENIX LIVEVIEW DASHBOARD
  phoenix-dashboard:
    build: ./phoenix-dashboard
    container_name: crod-dashboard
    environment:
      - PHX_HOST=localhost
      - BRAIN_URL=http://crod-brain:4000
    ports:
      - "4001:4001"
    depends_on:
      - crod-brain
    networks:
      - crod-net

  # PATTERN RECOGNITION (RUST)
  pattern-engine:
    build: ./pattern-engine
    container_name: crod-patterns
    environment:
      - BRAIN_URL=http://crod-brain:4000
    ports:
      - "7007:7007"
    volumes:
      - ./patterns:/data/patterns
    networks:
      - crod-net

  # MEMORY SYSTEM (GO)
  memory-bank:
    build: ./memory-bank
    container_name: crod-memory
    environment:
      - BRAIN_URL=http://crod-brain:4000
    ports:
      - "7031:7031"
    volumes:
      - memory-data:/data
    networks:
      - crod-net

  # AI/ML HUB (PYTHON)
  ai-hub:
    build: ./ai-hub
    container_name: crod-ai
    environment:
      - BRAIN_URL=http://crod-brain:4000
      - ENABLE_GPU=false
    ports:
      - "7113:7113"
    volumes:
      - ai-models:/models
    networks:
      - crod-net

  # REDIS FOR FAST COMMUNICATION
  redis:
    image: redis:alpine
    container_name: crod-redis
    ports:
      - "6379:6379"
    networks:
      - crod-net

  # POSTGRES FOR PERSISTENCE
  postgres:
    image: postgres:15
    container_name: crod-db
    environment:
      - POSTGRES_DB=crod_ultimativ
      - POSTGRES_USER=crod
      - POSTGRES_PASSWORD=blockchain2025
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - crod-net

  # GRAFANA FOR MONITORING
  grafana:
    image: grafana/grafana
    container_name: crod-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=crod
      - GF_INSTALL_PLUGINS=redis-datasource
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - crod-net

  # NGINX REVERSE PROXY
  nginx:
    image: nginx:alpine
    container_name: crod-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - crod-brain
      - phoenix-dashboard
      - n8n
    networks:
      - crod-net

volumes:
  crod-data:
  n8n-data:
  memory-data:
  postgres-data:
  grafana-data:
  ai-models:

networks:
  crod-net:
    driver: bridge