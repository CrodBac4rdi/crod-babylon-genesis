apiVersion: apps/v1
kind: Deployment
metadata:
  name: delta-quarter
  namespace: crod-polyglot
  labels:
    app: delta-quarter
    crod: hash-document-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: delta-quarter
  template:
    metadata:
      labels:
        app: delta-quarter
        crod: hash-document-system
      annotations:
        description: "CROD Delta Quarter - Hash-Document Delta Tracking"
    spec:
      containers:
      - name: delta-quarter
        image: crod/delta-quarter:latest
        ports:
        - containerPort: 7283
          name: http
        env:
        - name: PORT
          value: "7283"
        - name: REDIS_ADDR
          value: "redis-service:6379"
        - name: SERVICE_NAME
          value: "delta-quarter"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 7283
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 7283
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: delta-quarter-service
  namespace: crod-polyglot
  labels:
    app: delta-quarter
spec:
  selector:
    app: delta-quarter
  ports:
  - port: 7283
    targetPort: 7283
    name: http
  type: ClusterIP
---
# HPA for heat-based scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: delta-quarter-hpa
  namespace: crod-polyglot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: delta-quarter
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80