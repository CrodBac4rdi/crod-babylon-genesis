apiVersion: apps/v1
kind: Deployment
metadata:
  name: pattern-district-rust
  namespace: crod-polyglot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pattern-district
      district: pattern
  template:
    metadata:
      labels:
        app: pattern-district
        district: pattern
    spec:
      containers:
      - name: pattern-district
        image: crod/pattern-district-rust:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 7007
          name: http
        env:
        - name: PORT
          value: "7007"
        - name: DISTRICT_PRIME
          value: "7"
        - name: META_CHAIN_URL
          value: "http://meta-chain:8000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 7007
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 7007
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pattern-district
  namespace: crod-polyglot
spec:
  selector:
    app: pattern-district
  ports:
  - port: 7007
    targetPort: 7007
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pattern-district-hpa
  namespace: crod-polyglot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pattern-district-rust
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70