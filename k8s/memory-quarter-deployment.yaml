apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-quarter-go
  namespace: crod-polyglot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memory-quarter
      district: memory
  template:
    metadata:
      labels:
        app: memory-quarter
        district: memory
    spec:
      containers:
      - name: memory-quarter
        image: crod/memory-quarter-go:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 7031
          name: http
        env:
        - name: PORT
          value: "7031"
        - name: DISTRICT_PRIMES
          value: "31,37,41"
        - name: REDIS_ADDR
          value: "redis:6379"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 7031
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 7031
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: memory-quarter
  namespace: crod-polyglot
spec:
  selector:
    app: memory-quarter
  ports:
  - port: 7031
    targetPort: 7031
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: memory-quarter-hpa
  namespace: crod-polyglot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: memory-quarter-go
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80