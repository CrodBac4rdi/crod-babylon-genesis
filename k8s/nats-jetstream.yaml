apiVersion: v1
kind: Namespace
metadata:
  name: crod-messaging
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: crod-messaging
data:
  nats.conf: |
    port: 4222
    http: 8222
    
    # JetStream for persistence (5x faster than Redis!)
    jetstream {
      store_dir: "/data/jetstream"
      max_mem: 2G
      max_file: 10G
    }
    
    # Cluster configuration
    cluster {
      name: "crod-polyglot-cluster"
      port: 6222
      routes: [
        nats://nats-0.nats.crod-messaging.svc.cluster.local:6222
        nats://nats-1.nats.crod-messaging.svc.cluster.local:6222
        nats://nats-2.nats.crod-messaging.svc.cluster.local:6222
      ]
    }
    
    # CROD Districts Authentication
    accounts {
      META_CHAIN: {
        jetstream: enabled
        users: [{user: "meta-chain", password: "$2a$11$crod2025metachain"}]
      }
      PATTERN_DISTRICT: {
        jetstream: enabled
        users: [{user: "pattern", password: "$2a$11$crod2025pattern"}]
      }
      MEMORY_QUARTER: {
        jetstream: enabled  
        users: [{user: "memory", password: "$2a$11$crod2025memory"}]
      }
      INTELLIGENCE_HUB: {
        jetstream: enabled
        users: [{user: "intelligence", password: "$2a$11$crod2025intel"}]
      }
    }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: crod-messaging
spec:
  replicas: 3
  serviceName: nats
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
      - name: nats
        image: nats:2.10.18-alpine
        ports:
        - containerPort: 4222
          name: client
        - containerPort: 6222
          name: cluster
        - containerPort: 8222
          name: monitor
        command:
        - /nats-server
        - -c
        - /etc/nats/nats.conf
        volumeMounts:
        - name: config
          mountPath: /etc/nats
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8222
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz?js-enabled-only=true
            port: 8222
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: nats-config
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: crod-messaging
spec:
  selector:
    app: nats
  clusterIP: None
  ports:
  - name: client
    port: 4222
  - name: cluster
    port: 6222
  - name: monitor
    port: 8222
---
apiVersion: v1
kind: Service
metadata:
  name: nats-client
  namespace: crod-messaging
spec:
  selector:
    app: nats
  ports:
  - name: client
    port: 4222
    targetPort: 4222
  type: ClusterIP