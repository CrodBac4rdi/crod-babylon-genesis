apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-learning
  namespace: crod-polyglot
  labels:
    app: llama-learning
    district: learning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llama-learning
  template:
    metadata:
      labels:
        app: llama-learning
        district: learning
    spec:
      containers:
      - name: llama-learning
        image: crod/llama-learning:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8089
          name: http
        - containerPort: 8090
          name: websocket
        env:
        - name: REDIS_HOST
          value: redis
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8089
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8089
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: llama-learning
  namespace: crod-polyglot
  labels:
    app: llama-learning
spec:
  selector:
    app: llama-learning
  ports:
  - name: http
    port: 8089
    targetPort: 8089
  - name: websocket
    port: 8090
    targetPort: 8090
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: llama-learning-hpa
  namespace: crod-polyglot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: llama-learning
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80