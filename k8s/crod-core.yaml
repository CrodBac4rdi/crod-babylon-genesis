apiVersion: v1
kind: ConfigMap
metadata:
  name: crod-master-data
  namespace: crod-polyglot
data:
  crod-master.json: |
    $(cat /home/daniel/Schreibtisch/Crod Programming/CROD-Helper-Member-7/crod-master.json)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crod-core
  namespace: crod-polyglot
  labels:
    app: crod-core
    role: city-controller
    tier: supreme
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crod-core
  template:
    metadata:
      labels:
        app: crod-core
        role: city-controller
        tier: supreme
    spec:
      containers:
      - name: crod-core
        image: crod/crod-core:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8100
          name: http
        - containerPort: 8101
          name: websocket
        env:
        - name: REDIS_HOST
          value: redis
        - name: ROLE
          value: "SUPREME_CITY_CONTROLLER"
        - name: TRINITY_DANIEL
          value: "67"
        - name: TRINITY_CLAUDE
          value: "71"
        - name: TRINITY_CROD
          value: "17"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        volumeMounts:
        - name: master-data
          mountPath: /data
        livenessProbe:
          httpGet:
            path: /health
            port: 8100
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8100
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: master-data
        configMap:
          name: crod-master-data
---
apiVersion: v1
kind: Service
metadata:
  name: crod-core
  namespace: crod-polyglot
  labels:
    app: crod-core
spec:
  selector:
    app: crod-core
  ports:
  - name: http
    port: 8100
    targetPort: 8100
  - name: websocket
    port: 8101
    targetPort: 8101
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: crod-core-access
  namespace: crod-polyglot
spec:
  podSelector:
    matchLabels:
      app: crod-core
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {}  # All pods in namespace can talk to CROD
    ports:
    - protocol: TCP
      port: 8100
    - protocol: TCP
      port: 8101