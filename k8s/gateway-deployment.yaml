apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: crod-polyglot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
      district: entry-point
  template:
    metadata:
      labels:
        app: gateway
        district: entry-point
    spec:
      containers:
      - name: gateway
        image: ghcr.io/crodbac4rdi/crod-babylon-genesis/gateway-node:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8888
          name: http
        env:
        - name: PORT
          value: "8888"
        - name: REDIS_HOST
          value: "redis"
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8888
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8888
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: crod-polyglot
spec:
  selector:
    app: gateway
  ports:
  - port: 8888
    targetPort: 8888
    nodePort: 30889
  type: NodePort  # Accessible from outside!