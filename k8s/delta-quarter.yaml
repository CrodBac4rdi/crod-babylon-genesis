apiVersion: apps/v1
kind: Deployment
metadata:
  name: delta-quarter
  namespace: crod-polyglot
  labels:
    app: delta-quarter
    district: delta
spec:
  replicas: 1
  selector:
    matchLabels:
      app: delta-quarter
  template:
    metadata:
      labels:
        app: delta-quarter
        district: delta
    spec:
      containers:
      - name: delta-quarter
        image: crod/delta-quarter:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8087
        env:
        - name: REDIS_HOST
          value: redis
        - name: POSTGRES_HOST
          value: postgres-spatial
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8087
          initialDelaySeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8087
          initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: delta-quarter
  namespace: crod-polyglot
spec:
  selector:
    app: delta-quarter
  ports:
  - port: 8087
    targetPort: 8087