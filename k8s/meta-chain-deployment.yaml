apiVersion: v1
kind: Namespace
metadata:
  name: crod-polyglot
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meta-chain-elixir
  namespace: crod-polyglot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meta-chain
      district: orchestrator
  template:
    metadata:
      labels:
        app: meta-chain
        district: orchestrator
    spec:
      containers:
      - name: meta-chain
        image: crod/meta-chain-elixir:latest
        imagePullPolicy: IfNotPresent  # Use local if available
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: HTTP_PORT
          value: "8000"
        - name: REDIS_HOST
          value: "redis"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: meta-chain
  namespace: crod-polyglot
spec:
  selector:
    app: meta-chain
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP  # INTERNAL ONLY!
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-external
  namespace: crod-polyglot
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: crod-polyglot
    - podSelector: {}
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: crod-polyglot
    - podSelector: {}
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53  # DNS only
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: meta-chain-hpa
  namespace: crod-polyglot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: meta-chain-elixir
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80