apiVersion: apps/v1
kind: Deployment
metadata:
  name: blockchain-core
  namespace: crod-polyglot
  labels:
    app: blockchain-core
    crod: quantum-safe-blockchain
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blockchain-core
  template:
    metadata:
      labels:
        app: blockchain-core
        crod: quantum-safe-blockchain
      annotations:
        description: "CROD Quantum-Safe Blockchain with Document Delta Tracking"
    spec:
      containers:
      - name: blockchain-core
        image: crod/blockchain-core:latest
        ports:
        - containerPort: 7199
          name: http
        env:
        - name: PORT
          value: "7199"
        - name: REDIS_ADDR
          value: "redis-service:6379"
        - name: DELTA_QUARTER_URL
          value: "http://delta-quarter-service:7283"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /
            port: 7199
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /blockchain/validate
            port: 7199
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: blockchain-core-service
  namespace: crod-polyglot
  labels:
    app: blockchain-core
spec:
  selector:
    app: blockchain-core
  ports:
  - port: 7199
    targetPort: 7199
    name: http
  type: ClusterIP
---
# Network Policy for blockchain security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: blockchain-core-network-policy
  namespace: crod-polyglot
spec:
  podSelector:
    matchLabels:
      app: blockchain-core
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: crod-polyglot
    ports:
    - protocol: TCP
      port: 7199
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: crod-polyglot
    ports:
    - protocol: TCP
      port: 6379  # Redis
    - protocol: TCP
      port: 7283  # Delta Quarter
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53  # DNS
    - protocol: UDP
      port: 53