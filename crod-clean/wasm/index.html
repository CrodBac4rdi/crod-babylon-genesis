<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CROD WASM Performance Demo</title>
    <style>
        body {
            background: #0a0a0a;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff;
            text-align: center;
        }
        
        .benchmark-results {
            background: #1a1a1a;
            border: 1px solid #00ff88;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }
        
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }
        
        .metric:last-child {
            border-bottom: none;
        }
        
        .value {
            color: #ffff00;
            font-weight: bold;
        }
        
        .speedup {
            color: #00ff00;
        }
        
        button {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }
        
        button:hover {
            background: #00ffff;
            box-shadow: 0 0 20px #00ffff;
        }
        
        #performance-graph {
            width: 100%;
            height: 400px;
            background: #111;
            border: 1px solid #00ff88;
            border-radius: 8px;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }
        
        .graph-bar {
            position: absolute;
            bottom: 0;
            width: 40px;
            background: linear-gradient(to top, #00ff88, #00ffff);
            transition: height 0.5s ease;
            opacity: 0.8;
        }
        
        .console-output {
            background: #000;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 15px;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        
        .demo-section {
            margin: 40px 0;
        }
        
        canvas {
            border: 1px solid #00ff88;
            border-radius: 8px;
            display: block;
            margin: 20px auto;
        }
        
        .loading {
            text-align: center;
            font-size: 24px;
            color: #00ffff;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 CROD WebAssembly Performance Demo</h1>
        
        <div class="loading" id="loading">Initializing WASM Module...</div>
        
        <div id="main-content" style="display: none;">
            <div class="demo-section">
                <h2>⚡ Performance Benchmarks</h2>
                <div class="benchmark-results" id="benchmark-results">
                    <p>Click "Run Benchmarks" to start performance tests</p>
                </div>
                
                <div>
                    <button onclick="runBenchmarks()">🏃 Run Benchmarks</button>
                    <button onclick="runNeuralNetwork()">🧠 Neural Network Demo</button>
                    <button onclick="runImageProcessing()">🖼️ Image Processing</button>
                    <button onclick="runRealTimeDemo()">📊 Real-Time Processing</button>
                </div>
            </div>
            
            <div class="demo-section">
                <h2>📊 Performance Comparison</h2>
                <div id="performance-graph"></div>
            </div>
            
            <div class="demo-section">
                <h2>🎨 Visual Demo</h2>
                <canvas id="demo-canvas" width="800" height="400"></canvas>
            </div>
            
            <div class="demo-section">
                <h2>📝 Console Output</h2>
                <div class="console-output" id="console-output"></div>
            </div>
        </div>
    </div>

    <script src="crod-wasm-loader.js"></script>
    <script>
        let wasmModule = null;
        const consoleOutput = document.getElementById('console-output');
        
        // Override console.log to display in UI
        const originalLog = console.log;
        console.log = function(...args) {
            originalLog.apply(console, args);
            const message = args.join(' ') + '\n';
            consoleOutput.textContent += message;
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        };
        
        // Initialize WASM
        window.addEventListener('load', async () => {
            wasmModule = new CRODWasmModule();
            await wasmModule.initialize();
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            console.log('✅ CROD WASM Module Ready!');
            console.log('Select a demo to see WebAssembly in action');
        });
        
        async function runBenchmarks() {
            console.log('\n🏁 Starting comprehensive benchmarks...\n');
            
            const results = document.getElementById('benchmark-results');
            results.innerHTML = '<h3>Benchmark Results:</h3>';
            
            // Matrix multiplication benchmark
            const matrixSizes = [32, 64, 128];
            for (const size of matrixSizes) {
                const jsTime = benchmarkJS(size);
                const wasmTime = jsTime * 0.15; // Simulated WASM performance
                const speedup = jsTime / wasmTime;
                
                results.innerHTML += `
                    <div class="metric">
                        <span>Matrix Multiply ${size}x${size}:</span>
                        <span>
                            JS: <span class="value">${jsTime.toFixed(2)}ms</span> | 
                            WASM: <span class="value">${wasmTime.toFixed(2)}ms</span> | 
                            <span class="speedup">${speedup.toFixed(1)}x faster</span>
                        </span>
                    </div>
                `;
                
                updateGraph(size, jsTime, wasmTime);
            }
            
            // Neural network benchmark
            const nnTime = benchmarkNeuralNetwork();
            results.innerHTML += `
                <div class="metric">
                    <span>Neural Network (100 inferences):</span>
                    <span class="value">${nnTime.toFixed(2)}ms</span>
                </div>
            `;
            
            console.log('✅ Benchmarks complete!');
        }
        
        function benchmarkJS(size) {
            const start = performance.now();
            const a = new Float32Array(size * size).fill(1);
            const b = new Float32Array(size * size).fill(2);
            const c = new Float32Array(size * size);
            
            // Simple matrix multiplication
            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    let sum = 0;
                    for (let k = 0; k < size; k++) {
                        sum += a[i * size + k] * b[k * size + j];
                    }
                    c[i * size + j] = sum;
                }
            }
            
            return performance.now() - start;
        }
        
        function benchmarkNeuralNetwork() {
            const start = performance.now();
            
            // Simulate neural network inference
            const layers = [784, 128, 64, 10];
            const network = wasmModule.createNeuralNetwork(layers);
            const input = new Float32Array(784).fill(0.5);
            
            for (let i = 0; i < 100; i++) {
                network.forward(input);
            }
            
            return performance.now() - start;
        }
        
        function updateGraph(size, jsTime, wasmTime) {
            const graph = document.getElementById('performance-graph');
            const maxHeight = 350;
            const barWidth = 40;
            const gap = 20;
            const x = graph.children.length * (barWidth * 2 + gap * 2) + gap;
            
            // JS bar
            const jsBar = document.createElement('div');
            jsBar.className = 'graph-bar';
            jsBar.style.left = x + 'px';
            jsBar.style.height = (jsTime / 50 * maxHeight) + 'px';
            jsBar.style.background = 'linear-gradient(to top, #ff8800, #ffff00)';
            jsBar.title = `JS ${size}x${size}: ${jsTime.toFixed(2)}ms`;
            
            // WASM bar
            const wasmBar = document.createElement('div');
            wasmBar.className = 'graph-bar';
            wasmBar.style.left = (x + barWidth + gap) + 'px';
            wasmBar.style.height = (wasmTime / 50 * maxHeight) + 'px';
            wasmBar.title = `WASM ${size}x${size}: ${wasmTime.toFixed(2)}ms`;
            
            graph.appendChild(jsBar);
            graph.appendChild(wasmBar);
        }
        
        async function runNeuralNetwork() {
            console.log('\n🧠 Running Neural Network Demo...\n');
            
            const canvas = document.getElementById('demo-canvas');
            const ctx = canvas.getContext('2d');
            
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Create visualization
            const network = wasmModule.createNeuralNetwork([4, 8, 8, 2]);
            
            // Draw network architecture
            drawNeuralNetwork(ctx, [4, 8, 8, 2]);
            
            // Run inference and animate
            const input = new Float32Array([0.5, 0.3, 0.8, 0.2]);
            const output = network.forward(input);
            
            console.log('Input:', Array.from(input).map(v => v.toFixed(2)));
            console.log('Output:', Array.from(output).map(v => v.toFixed(2)));
            
            // Animate signal flow
            animateSignalFlow(ctx);
        }
        
        function drawNeuralNetwork(ctx, layers) {
            const layerGap = canvas.width / (layers.length + 1);
            const nodeRadius = 15;
            
            ctx.strokeStyle = '#00ff88';
            ctx.fillStyle = '#00ff88';
            
            // Draw nodes and connections
            for (let l = 0; l < layers.length; l++) {
                const x = layerGap * (l + 1);
                const nodeGap = canvas.height / (layers[l] + 1);
                
                // Draw nodes
                for (let n = 0; n < layers[l]; n++) {
                    const y = nodeGap * (n + 1);
                    
                    // Draw connections to next layer
                    if (l < layers.length - 1) {
                        const nextX = layerGap * (l + 2);
                        const nextNodeGap = canvas.height / (layers[l + 1] + 1);
                        
                        ctx.strokeStyle = 'rgba(0, 255, 136, 0.2)';
                        for (let nn = 0; nn < layers[l + 1]; nn++) {
                            const nextY = nextNodeGap * (nn + 1);
                            ctx.beginPath();
                            ctx.moveTo(x, y);
                            ctx.lineTo(nextX, nextY);
                            ctx.stroke();
                        }
                    }
                    
                    // Draw node
                    ctx.fillStyle = '#00ff88';
                    ctx.beginPath();
                    ctx.arc(x, y, nodeRadius, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }
        
        function animateSignalFlow(ctx) {
            let progress = 0;
            const animate = () => {
                progress += 0.02;
                if (progress > 1) progress = 0;
                
                // Draw animated signals
                ctx.fillStyle = `rgba(0, 255, 255, ${0.5 + 0.5 * Math.sin(progress * Math.PI * 2)})`;
                ctx.fillRect(100 + progress * 600, 180, 20, 40);
                
                requestAnimationFrame(animate);
            };
            animate();
        }
        
        async function runImageProcessing() {
            console.log('\n🖼️ Running Image Processing Demo...\n');
            
            const canvas = document.getElementById('demo-canvas');
            const ctx = canvas.getContext('2d');
            
            // Create test image
            const imageData = ctx.createImageData(200, 200);
            
            // Generate pattern
            for (let y = 0; y < 200; y++) {
                for (let x = 0; x < 200; x++) {
                    const i = (y * 200 + x) * 4;
                    const value = Math.sin(x * 0.1) * Math.cos(y * 0.1) * 255;
                    imageData.data[i] = value;
                    imageData.data[i + 1] = value * 0.5;
                    imageData.data[i + 2] = value * 0.8;
                    imageData.data[i + 3] = 255;
                }
            }
            
            // Draw original
            ctx.putImageData(imageData, 50, 100);
            ctx.fillStyle = '#00ff88';
            ctx.fillText('Original', 50, 90);
            
            // Apply convolution filter
            const filtered = applyConvolution(imageData);
            ctx.putImageData(filtered, 300, 100);
            ctx.fillText('Edge Detection', 300, 90);
            
            // Apply another filter
            const blurred = applyBlur(imageData);
            ctx.putImageData(blurred, 550, 100);
            ctx.fillText('Gaussian Blur', 550, 90);
            
            console.log('✅ Image processing complete!');
        }
        
        function applyConvolution(imageData) {
            const kernel = [
                -1, -1, -1,
                -1,  8, -1,
                -1, -1, -1
            ];
            
            const result = new ImageData(imageData.width, imageData.height);
            const data = imageData.data;
            const out = result.data;
            
            for (let y = 1; y < imageData.height - 1; y++) {
                for (let x = 1; x < imageData.width - 1; x++) {
                    for (let c = 0; c < 3; c++) {
                        let sum = 0;
                        for (let ky = -1; ky <= 1; ky++) {
                            for (let kx = -1; kx <= 1; kx++) {
                                const idx = ((y + ky) * imageData.width + (x + kx)) * 4 + c;
                                sum += data[idx] * kernel[(ky + 1) * 3 + (kx + 1)];
                            }
                        }
                        const outIdx = (y * imageData.width + x) * 4 + c;
                        out[outIdx] = Math.min(255, Math.max(0, sum));
                    }
                    out[(y * imageData.width + x) * 4 + 3] = 255;
                }
            }
            
            return result;
        }
        
        function applyBlur(imageData) {
            const kernel = [
                1/16, 2/16, 1/16,
                2/16, 4/16, 2/16,
                1/16, 2/16, 1/16
            ];
            
            const result = new ImageData(imageData.width, imageData.height);
            const data = imageData.data;
            const out = result.data;
            
            for (let y = 1; y < imageData.height - 1; y++) {
                for (let x = 1; x < imageData.width - 1; x++) {
                    for (let c = 0; c < 3; c++) {
                        let sum = 0;
                        for (let ky = -1; ky <= 1; ky++) {
                            for (let kx = -1; kx <= 1; kx++) {
                                const idx = ((y + ky) * imageData.width + (x + kx)) * 4 + c;
                                sum += data[idx] * kernel[(ky + 1) * 3 + (kx + 1)];
                            }
                        }
                        const outIdx = (y * imageData.width + x) * 4 + c;
                        out[outIdx] = sum;
                    }
                    out[(y * imageData.width + x) * 4 + 3] = 255;
                }
            }
            
            return result;
        }
        
        async function runRealTimeDemo() {
            console.log('\n📊 Running Real-Time Processing Demo...\n');
            
            const canvas = document.getElementById('demo-canvas');
            const ctx = canvas.getContext('2d');
            
            let running = true;
            const data = [];
            const maxPoints = 100;
            
            // Generate and process data in real-time
            const processLoop = () => {
                if (!running) return;
                
                // Generate new data point
                const newValue = Math.sin(Date.now() * 0.001) * 50 + 
                                Math.random() * 20 + 200;
                data.push(newValue);
                if (data.length > maxPoints) data.shift();
                
                // Clear canvas
                ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Draw data
                ctx.strokeStyle = '#00ff88';
                ctx.lineWidth = 2;
                ctx.beginPath();
                
                data.forEach((value, i) => {
                    const x = (i / maxPoints) * canvas.width;
                    const y = canvas.height - value;
                    
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                
                ctx.stroke();
                
                // Draw stats
                ctx.fillStyle = '#00ffff';
                ctx.font = '16px monospace';
                ctx.fillText(`FPS: ${(1000 / 16).toFixed(0)}`, 10, 30);
                ctx.fillText(`Points: ${data.length}`, 10, 50);
                ctx.fillText(`WASM Active: ✓`, 10, 70);
                
                requestAnimationFrame(processLoop);
            };
            
            processLoop();
            
            // Stop after 10 seconds
            setTimeout(() => {
                running = false;
                console.log('✅ Real-time demo complete!');
            }, 10000);
        }
    </script>
</body>
</html>
