<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CROD Real-Time Monitor</title>
    <style>
        body {
            background: #0F0F1E;
            color: #fff;
            font-family: monospace;
            margin: 0;
            padding: 20px;
        }
        
        h1 {
            color: #FF6B6B;
            text-align: center;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #1A1A2E;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #FF6B6B33;
        }
        
        .stat-value {
            font-size: 2em;
            color: #4ECDC4;
        }
        
        #output {
            background: #1A1A2E;
            padding: 20px;
            border-radius: 10px;
            height: 400px;
            overflow-y: auto;
            border: 1px solid #4ECDC433;
        }
        
        .output-line {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #9B5DE5;
        }
        
        .status {
            text-align: center;
            padding: 10px;
            background: #FF6B6B;
            color: #000;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .connected {
            background: #4ECDC4;
        }
    </style>
</head>
<body>
    <h1>🧠 CROD Real-Time Monitor</h1>
    
    <div id="status" class="status">Connecting to CROD...</div>
    
    <div class="stats">
        <div class="stat-card">
            <div>Patterns Learned</div>
            <div class="stat-value" id="patterns">0</div>
        </div>
        <div class="stat-card">
            <div>Commands Processed</div>
            <div class="stat-value" id="commands">0</div>
        </div>
        <div class="stat-card">
            <div>Learning Status</div>
            <div class="stat-value" id="learning">Active</div>
        </div>
    </div>
    
    <h2>Live Output Stream</h2>
    <div id="output"></div>
    
    <script>
        let ws;
        let reconnectInterval;
        
        function connect() {
            ws = new WebSocket('ws://localhost:8765');
            
            ws.onopen = () => {
                document.getElementById('status').textContent = 'Connected to CROD';
                document.getElementById('status').classList.add('connected');
                clearInterval(reconnectInterval);
                
                // Request status
                ws.send(JSON.stringify({ command: 'getStatus' }));
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.patterns !== undefined) {
                    document.getElementById('patterns').textContent = data.patterns;
                    document.getElementById('commands').textContent = data.commands;
                    document.getElementById('learning').textContent = data.isLearning ? 'Active' : 'Paused';
                }
                
                if (data.type === 'output') {
                    const output = document.getElementById('output');
                    const line = document.createElement('div');
                    line.className = 'output-line';
                    line.textContent = data.data;
                    output.appendChild(line);
                    output.scrollTop = output.scrollHeight;
                }
            };
            
            ws.onclose = () => {
                document.getElementById('status').textContent = 'Disconnected - Reconnecting...';
                document.getElementById('status').classList.remove('connected');
                
                reconnectInterval = setInterval(() => {
                    connect();
                }, 2000);
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }
        
        connect();
        
        // Auto-refresh stats
        setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ command: 'getStatus' }));
            }
        }, 1000);
    </script>
</body>
</html>
