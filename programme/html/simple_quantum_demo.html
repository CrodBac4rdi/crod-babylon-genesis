<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CROD Quantum Mining Visualization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes quantum-pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        .quantum-bit {
            animation: quantum-pulse 2s infinite;
        }
        
        .entangled {
            background: linear-gradient(45deg, #8B5CF6, #3B82F6);
        }
    </style>
</head>
<body class="bg-gray-900 text-white">
    <div class="container mx-auto p-8">
        <h1 class="text-5xl font-bold text-center mb-12">⚛️ CROD Quantum Mining</h1>
        
        <!-- Quantum State Visualization -->
        <div class="bg-gray-800 rounded-xl p-8 mb-8">
            <h2 class="text-2xl font-semibold mb-6">Quantum State Visualization</h2>
            
            <div class="grid grid-cols-8 gap-4 mb-8">
                <div id="qubits" class="col-span-8 grid grid-cols-8 gap-2">
                    <!-- Qubits will be generated here -->
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm mb-2">Coherence Level</label>
                    <div class="w-full bg-gray-700 rounded-full h-4">
                        <div id="coherence-bar" class="bg-green-500 h-4 rounded-full transition-all" style="width: 100%"></div>
                    </div>
                </div>
                <div>
                    <label class="block text-sm mb-2">Quantum Advantage</label>
                    <div id="advantage" class="text-2xl font-bold text-purple-400">0x</div>
                </div>
            </div>
        </div>

        <!-- Mining Control -->
        <div class="bg-gray-800 rounded-xl p-8 mb-8">
            <h2 class="text-2xl font-semibold mb-6">Quantum Mining Control</h2>
            
            <div class="grid grid-cols-3 gap-4 mb-6">
                <div>
                    <label class="block text-sm mb-2">Qubits</label>
                    <select id="qubit-count" class="w-full px-3 py-2 bg-gray-700 rounded">
                        <option value="4">4 Qubits</option>
                        <option value="8" selected>8 Qubits</option>
                        <option value="16">16 Qubits</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm mb-2">Difficulty</label>
                    <input type="number" id="difficulty" value="3" min="1" max="6" 
                           class="w-full px-3 py-2 bg-gray-700 rounded">
                </div>
                <div>
                    <label class="block text-sm mb-2">Mining Mode</label>
                    <select id="mode" class="w-full px-3 py-2 bg-gray-700 rounded">
                        <option value="quantum">Quantum</option>
                        <option value="classical">Classical</option>
                        <option value="hybrid">Hybrid</option>
                    </select>
                </div>
            </div>
            
            <button onclick="startQuantumMining()" 
                    class="w-full px-6 py-3 bg-purple-600 hover:bg-purple-700 rounded-lg font-semibold">
                Start Quantum Mining
            </button>
        </div>

        <!-- Results -->
        <div class="bg-gray-800 rounded-xl p-8">
            <h2 class="text-2xl font-semibold mb-6">Mining Results</h2>
            <div id="results" class="space-y-2 font-mono text-sm"></div>
        </div>
    </div>

    <script>
        // Quantum state representation
        class QuantumState {
            constructor(nQubits) {
                this.nQubits = nQubits;
                this.qubits = [];
                this.coherence = 1.0;
                this.entanglements = new Map();
                
                // Initialize qubits in superposition
                for (let i = 0; i < nQubits; i++) {
                    this.qubits.push({
                        id: i,
                        alpha: Math.sqrt(0.5), // |0⟩ amplitude
                        beta: Math.sqrt(0.5),  // |1⟩ amplitude
                        phase: 0
                    });
                }
            }
            
            applyHadamard(qubitId) {
                const q = this.qubits[qubitId];
                const newAlpha = (q.alpha + q.beta) / Math.sqrt(2);
                const newBeta = (q.alpha - q.beta) / Math.sqrt(2);
                
                this.qubits[qubitId] = { ...q, alpha: newAlpha, beta: newBeta };
                this.coherence *= 0.99; // Decoherence
            }
            
            entangle(q1, q2) {
                this.entanglements.set(`${q1}-${q2}`, true);
            }
            
            measure(qubitId) {
                const q = this.qubits[qubitId];
                const probOne = Math.pow(q.beta, 2);
                
                // Collapse the wavefunction
                const measured = Math.random() < probOne ? 1 : 0;
                
                this.qubits[qubitId] = {
                    ...q,
                    alpha: measured === 0 ? 1 : 0,
                    beta: measured === 1 ? 1 : 0
                };
                
                this.coherence *= 0.9;
                return measured;
            }
            
            measureAll() {
                return this.qubits.map((_, i) => this.measure(i));
            }
        }

        // Visualization
        function initializeQubits(count) {
            const container = document.getElementById('qubits');
            container.innerHTML = '';
            container.className = `col-span-8 grid grid-cols-${count} gap-2`;
            
            for (let i = 0; i < count; i++) {
                const qubit = document.createElement('div');
                qubit.id = `qubit-${i}`;
                qubit.className = 'quantum-bit aspect-square rounded-lg bg-purple-600/30 border-2 border-purple-500 flex items-center justify-center text-2xl font-bold';
                qubit.innerHTML = '|ψ⟩';
                container.appendChild(qubit);
            }
        }

        // Quantum mining simulation
        async function startQuantumMining() {
            const nQubits = parseInt(document.getElementById('qubit-count').value);
            const difficulty = parseInt(document.getElementById('difficulty').value);
            const mode = document.getElementById('mode').value;
            
            const results = document.getElementById('results');
            results.innerHTML = '<div class="text-yellow-400">Initializing quantum state...</div>';
            
            // Initialize visualization
            initializeQubits(nQubits);
            
            // Create quantum state
            const qState = new QuantumState(nQubits);
            
            // Apply quantum gates
            results.innerHTML += '<div class="text-blue-400">Applying Hadamard gates...</div>';
            for (let i = 0; i < nQubits; i++) {
                qState.applyHadamard(i);
                await visualizeQubit(i, 'superposition');
            }
            
            // Create entanglements
            results.innerHTML += '<div class="text-purple-400">Creating entanglements...</div>';
            for (let i = 0; i < nQubits - 1; i += 2) {
                qState.entangle(i, i + 1);
                await visualizeEntanglement(i, i + 1);
            }
            
            // Mining loop
            let found = false;
            let attempts = 0;
            const target = '0'.repeat(difficulty);
            const startTime = Date.now();
            
            results.innerHTML += '<div class="text-green-400">Starting quantum mining...</div>';
            
            while (!found && attempts < 1000) {
                attempts++;
                
                // Measure qubits
                const bits = qState.measureAll();
                const nonce = parseInt(bits.join(''), 2);
                
                // Calculate hash (simulated)
                const hash = simulateHash(nonce);
                
                if (hash.startsWith(target)) {
                    found = true;
                    const duration = (Date.now() - startTime) / 1000;
                    
                    results.innerHTML += `
                        <div class="text-green-500 font-bold mt-4">✅ Quantum mining successful!</div>
                        <div>Nonce: ${nonce} (${bits.join('')})</div>
                        <div>Hash: ${hash}</div>
                        <div>Attempts: ${attempts}</div>
                        <div>Time: ${duration.toFixed(2)}s</div>
                        <div>Coherence: ${(qState.coherence * 100).toFixed(1)}%</div>
                    `;
                    
                    // Calculate quantum advantage
                    const classicalExpected = Math.pow(16, difficulty);
                    const advantage = classicalExpected / attempts;
                    document.getElementById('advantage').textContent = `${advantage.toFixed(1)}x`;
                    
                    // Add to blockchain
                    addQuantumBlock(nonce, hash, attempts, qState.coherence);
                }
                
                // Update coherence visualization
                document.getElementById('coherence-bar').style.width = `${qState.coherence * 100}%`;
                
                // Re-initialize for next attempt
                if (!found) {
                    qState.qubits.forEach((q, i) => {
                        qState.qubits[i] = {
                            ...q,
                            alpha: Math.sqrt(0.5),
                            beta: Math.sqrt(0.5) * Math.exp(Math.random() * Math.PI * 2 * i)
                        };
                    });
                }
                
                await sleep(10);
            }
            
            if (!found) {
                results.innerHTML += '<div class="text-red-400">Mining timeout - coherence depleted</div>';
            }
        }

        function simulateHash(nonce) {
            // Simple hash simulation
            let hash = 0;
            let n = nonce;
            
            for (let i = 0; i < 8; i++) {
                hash = ((hash << 5) - hash) + n;
                hash = hash & hash;
                n = n >> 8;
            }
            
            return Math.abs(hash).toString(16).padStart(8, '0');
        }

        async function visualizeQubit(id, state) {
            const qubit = document.getElementById(`qubit-${id}`);
            qubit.classList.add('scale-110');
            
            if (state === 'superposition') {
                qubit.style.background = 'linear-gradient(45deg, #8B5CF6, #EC4899)';
            }
            
            await sleep(100);
            qubit.classList.remove('scale-110');
        }

        async function visualizeEntanglement(q1, q2) {
            const qubit1 = document.getElementById(`qubit-${q1}`);
            const qubit2 = document.getElementById(`qubit-${q2}`);
            
            qubit1.classList.add('entangled');
            qubit2.classList.add('entangled');
            
            await sleep(200);
        }

        function addQuantumBlock(nonce, hash, attempts, coherence) {
            fetch('http://localhost:8001/blocks/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    data: {
                        type: 'quantum_mined',
                        nonce: nonce,
                        hash: hash,
                        attempts: attempts,
                        final_coherence: coherence,
                        timestamp: new Date().toISOString()
                    },
                    consciousness_level: 0.99
                })
            });
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Initialize on load
        window.onload = () => {
            initializeQubits(8);
        };
    </script>
</body>
</html>
