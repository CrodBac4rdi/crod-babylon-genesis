global
    log 127.0.0.1:514 local0
    maxconn 4096
    
defaults
    mode http
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms
    option httplog
    
frontend crod_frontend
    bind *:8080
    option forwardfor
    
    # Health check endpoint passthrough
    acl health_check path /health
    use_backend crod_backend if health_check
    
    default_backend crod_backend
    
backend crod_backend
    balance roundrobin
    option httpchk GET /health
    
    # Blue instance
    server blue 127.0.0.1:8000 check inter 2000 rise 2 fall 3
    
    # Green instance
    server green 127.0.0.1:8001 check inter 2000 rise 2 fall 3