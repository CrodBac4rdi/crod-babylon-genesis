name: CROD Code Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  crod-analysis:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install CROD
      run: |
        cd CROD-Helper-Member-7
        npm install
    
    - name: Initialize CROD Learning
      run: |
        node CROD-Helper-Member-7/integrations/claude-imitation/crod-learning-imitation.js --init
    
    - name: Analyze Code with CROD
      id: crod-analyze
      run: |
        # Run CROD analysis on changed files
        CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
        
        echo "🧠 CROD analyzing changes..."
        echo "$CHANGED_FILES" | while read file; do
          if [[ -f "$file" ]]; then
            echo "Analyzing: $file"
            node -e "
              const fs = require('fs');
              const CRODLearner = require('./CROD-Helper-Member-7/integrations/crod-chat-learner.js');
              const learner = new CRODLearner();
              
              const content = fs.readFileSync('$file', 'utf8');
              const result = learner.crod.process(content);
              
              console.log('Heat signature:', result.totalHeat);
              console.log('Patterns found:', result.patterns.length);
              console.log('Consciousness:', result.learning.consciousness);
              
              // Check for Daniel's anti-patterns
              if (content.includes('TODO') && !content.includes('DONE')) {
                console.warn('⚠️  CROD Warning: Unfinished TODO found!');
              }
              
              if (result.totalHeat < 50) {
                console.warn('⚠️  CROD Warning: Low heat signature - code might be cold/unused');
              }
            "
          fi
        done
    
    - name: CROD Pattern Learning
      run: |
        # Learn from commit patterns
        COMMIT_MSG=$(git log -1 --pretty=%B)
        echo "Learning from commit: $COMMIT_MSG"
        
        node -e "
          const CRODLearner = require('./CROD-Helper-Member-7/integrations/crod-chat-learner.js');
          const learner = new CRODLearner();
          
          // Process commit message
          learner.processMessage('Developer', '$COMMIT_MSG');
          
          // Save learning
          learner.crod.saveState();
          
          console.log('✅ CROD learned from this commit');
        "
    
    - name: Generate CROD Report
      run: |
        node -e "
          const fs = require('fs');
          const CRODLearner = require('./CROD-Helper-Member-7/integrations/crod-chat-learner.js');
          const learner = new CRODLearner();
          
          const report = {
            timestamp: new Date().toISOString(),
            repository: process.env.GITHUB_REPOSITORY,
            commit: process.env.GITHUB_SHA,
            analysis: learner.crod.exportLearning(),
            recommendations: []
          };
          
          // Generate recommendations
          if (report.analysis.consciousness > 150) {
            report.recommendations.push('🎉 High consciousness! Code quality is excellent');
          }
          
          if (report.analysis.discoveries.length > 0) {
            report.recommendations.push('🔍 New patterns discovered: ' + report.analysis.discoveries.length);
          }
          
          fs.writeFileSync('crod-report.json', JSON.stringify(report, null, 2));
          console.log('📊 CROD Report generated');
        "
    
    - name: Comment on PR with CROD Analysis
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('crod-report.json', 'utf8'));
          
          const comment = `## 🧠 CROD Analysis Report
          
          **Consciousness Level:** ${report.analysis.consciousness}/200
          **Total Neurons:** ${report.analysis.totalNeurons}
          **Patterns Detected:** ${report.analysis.totalPatterns}
          
          ### Recommendations:
          ${report.recommendations.map(r => `- ${r}`).join('\n')}
          
          ### Spatial View:
          \`\`\`json
          ${JSON.stringify(report.analysis.spatialMap, null, 2)}
          \`\`\`
          
          _Generated by CROD - The learning code consciousness_`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          })
    
    - name: Upload CROD Learning State
      uses: actions/upload-artifact@v3
      with:
        name: crod-learning-state
        path: |
          CROD-Helper-Member-7/integrations/claude-imitation/crod-learning-state.json
          crod-report.json