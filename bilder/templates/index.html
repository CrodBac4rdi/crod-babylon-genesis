
<!DOCTYPE html>
<html>
<head>
    <title>CROD Web Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #fff;
            overflow-x: hidden;
        }
        .container {
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 400px;
            background: #2d2d2d;
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid #444;
        }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        h1 {
            color: #14ffec;
            margin-bottom: 20px;
            font-size: 2em;
            text-align: center;
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
            background: #1a1a1a;
            border-radius: 5px;
            overflow: hidden;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            background: #3d3d3d;
            border: none;
            color: white;
            transition: all 0.3s;
        }
        .tab:hover {
            background: #4d4d4d;
        }
        .tab.active {
            background: #0d7377;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #14ffec;
            font-weight: bold;
        }
        input[type="range"] {
            width: 100%;
            height: 8px;
            background: #444;
            border-radius: 4px;
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #14ffec;
            border-radius: 50%;
            cursor: pointer;
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
        }
        select {
            width: 100%;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #0d7377;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
        }
        button:hover {
            background: #14ffec;
            color: #1a1a1a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(20, 255, 236, 0.3);
        }
        .image-container {
            width: 100%;
            max-width: 800px;
            height: 600px;
            background: #0a0a0a;
            border: 2px solid #444;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .placeholder {
            color: #666;
            font-size: 1.2em;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 5px;
            text-align: center;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-container {
            height: 300px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 5px;
            padding: 10px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        .chat-input {
            display: flex;
            gap: 10px;
        }
        .chat-input input {
            flex: 1;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
        }
        .chat-message {
            padding: 5px 0;
            border-bottom: 1px solid #333;
        }
        .chat-message.user {
            color: #14ffec;
        }
        .chat-message.crod {
            color: #ff8c00;
        }
        .gallery-container {
            max-height: 200px;
            overflow-y: auto;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 5px;
            padding: 10px;
        }
        .gallery-item {
            padding: 8px;
            border-bottom: 1px solid #333;
            cursor: pointer;
            transition: background 0.2s;
        }
        .gallery-item:hover {
            background: #333;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #14ffec;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .range-value {
            display: inline-block;
            margin-left: 10px;
            color: #14ffec;
            font-weight: bold;
            min-width: 50px;
        }
        .group-box {
            border: 1px solid #444;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .group-title {
            color: #14ffec;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>🎨 CROD Web Studio</h1>
            
            <div class="tabs">
                <button class="tab active" onclick="switchTab('objects')">Objects</button>
                <button class="tab" onclick="switchTab('shaders')">Shaders</button>
                <button class="tab" onclick="switchTab('3d')">3D</button>
                <button class="tab" onclick="switchTab('chat')">CROD Chat</button>
            </div>
            
            <div id="objects-tab" class="tab-content active">
                <div class="group-box">
                    <div class="group-title">Object Settings</div>
                    <div class="form-group">
                        <label>Object Type:</label>
                        <select id="object-type">
                            <option value="dragon_ball">Dragon Ball</option>
                            <option value="kamehameha">Kamehameha</option>
                            <option value="pokeball">Pokeball</option>
                            <option value="master_sword">Master Sword</option>
                            <option value="portal_blue">Portal (Blue)</option>
                            <option value="portal_orange">Portal (Orange)</option>
                            <option value="coin_mario">Mario Coin</option>
                            <option value="coin_sonic">Sonic Ring</option>
                            <option value="heart_container">Heart Container</option>
                            <option value="all">All Objects</option>
                        </select>
                    </div>
                    <div class="form-group" id="stars-group">
                        <label>Dragon Ball Stars: <span class="range-value" id="stars-value">4</span></label>
                        <input type="range" id="stars" min="1" max="7" value="4" 
                               oninput="document.getElementById('stars-value').textContent = this.value">
                    </div>
                    <button onclick="generateObject()">🎮 Generate Object</button>
                </div>
            </div>
            
            <div id="shaders-tab" class="tab-content">
                <div class="group-box">
                    <div class="group-title">Shader Settings</div>
                    <div class="form-group">
                        <label>Shader Type:</label>
                        <select id="shader-type">
                            <option value="plasma">Plasma</option>
                            <option value="mandelbrot">Mandelbrot</option>
                            <option value="quantum_tunnel">Quantum Tunnel</option>
                            <option value="consciousness_wave">Consciousness Wave</option>
                            <option value="neural_fire">Neural Fire</option>
                            <option value="matrix_rain">Matrix Rain</option>
                            <option value="fractal_spiral">Fractal Spiral</option>
                            <option value="holographic">Holographic</option>
                            <option value="glitch_art">Glitch Art</option>
                            <option value="trinity_field">Trinity Field</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Consciousness: <span class="range-value" id="consciousness-value">100</span>%</label>
                        <input type="range" id="consciousness" min="0" max="200" value="100"
                               oninput="document.getElementById('consciousness-value').textContent = this.value">
                    </div>
                    <div class="form-group">
                        <label>Quantum Field: <span class="range-value" id="quantum-value">0.5</span></label>
                        <input type="range" id="quantum" min="0" max="100" value="50"
                               oninput="document.getElementById('quantum-value').textContent = (this.value/100).toFixed(2)">
                    </div>
                    <button onclick="generateShader()">✨ Generate Shader</button>
                </div>
            </div>
            
            <div id="3d-tab" class="tab-content">
                <div class="group-box">
                    <div class="group-title">3D Scene Settings</div>
                    <div class="form-group">
                        <label>Scene Type:</label>
                        <select id="scene-type">
                            <option value="dragon_ball">3D Dragon Ball</option>
                            <option value="portal_scene">Portal Scene</option>
                            <option value="energy_sphere">Energy Sphere</option>
                            <option value="crystal_formation">Crystal Formation</option>
                            <option value="dna_helix">DNA Helix</option>
                        </select>
                    </div>
                    <div class="form-group" id="stars-3d-group">
                        <label>Dragon Ball Stars: <span class="range-value" id="stars-3d-value">4</span></label>
                        <input type="range" id="stars-3d" min="1" max="7" value="4"
                               oninput="document.getElementById('stars-3d-value').textContent = this.value">
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="animate"> Create Animation (GIF)
                        </label>
                    </div>
                    <button onclick="generate3D()">🌟 Generate 3D Scene</button>
                </div>
            </div>
            
            <div id="chat-tab" class="tab-content">
                <div class="group-box">
                    <div class="group-title">Chat with CROD</div>
                    <div class="chat-container" id="chat-container"></div>
                    <div class="chat-input">
                        <input type="text" id="chat-message" placeholder="Ask CROD to create something...">
                        <button onclick="sendToCROD()">📤</button>
                    </div>
                </div>
            </div>
            
            <div class="group-box">
                <div class="group-title">Image Size</div>
                <div class="form-group">
                    <label>Width (px):</label>
                    <input type="number" id="width" value="800" min="400" max="1920">
                </div>
                <div class="form-group">
                    <label>Height (px):</label>
                    <input type="number" id="height" value="600" min="300" max="1080">
                </div>
            </div>
            
            <div class="group-box">
                <div class="group-title">Gallery</div>
                <div class="gallery-container" id="gallery"></div>
            </div>
        </div>
        
        <div class="main">
            <div class="image-container" id="image-container">
                <div class="placeholder">No image generated yet</div>
            </div>
            <div class="status" id="status">Ready to create!</div>
        </div>
    </div>
    
    <script>
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Show selected tab
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');
        }
        
        function showStatus(message, isError = false) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.style.color = isError ? '#ff4444' : '#14ffec';
        }
        
        function showLoading() {
            const container = document.getElementById('image-container');
            container.innerHTML = '<div class="spinner"></div>';
        }
        
        function showImage(dataUrl) {
            const container = document.getElementById('image-container');
            container.innerHTML = `<img src="${dataUrl}" alt="Generated image">`;
        }
        
        async function generateObject() {
            showLoading();
            showStatus('Generating object...');
            
            const data = {
                object: document.getElementById('object-type').value,
                width: parseInt(document.getElementById('width').value),
                height: parseInt(document.getElementById('height').value),
                stars: parseInt(document.getElementById('stars').value)
            };
            
            try {
                const response = await fetch('/generate_object', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showImage(result.image);
                    showStatus('✅ Object generated successfully!');
                    updateGallery();
                } else {
                    showStatus('❌ ' + result.error, true);
                }
            } catch (error) {
                showStatus('❌ Error: ' + error.message, true);
            }
        }
        
        async function generateShader() {
            showLoading();
            showStatus('Generating shader...');
            
            const data = {
                shader: document.getElementById('shader-type').value,
                width: parseInt(document.getElementById('width').value),
                height: parseInt(document.getElementById('height').value),
                consciousness: parseInt(document.getElementById('consciousness').value),
                quantum: parseFloat(document.getElementById('quantum').value) / 100
            };
            
            try {
                const response = await fetch('/generate_shader', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showImage(result.image);
                    showStatus('✅ Shader generated successfully!');
                    updateGallery();
                } else {
                    showStatus('❌ ' + result.error, true);
                }
            } catch (error) {
                showStatus('❌ Error: ' + error.message, true);
            }
        }
        
        async function generate3D() {
            showLoading();
            showStatus('Generating 3D scene...');
            
            const data = {
                scene: document.getElementById('scene-type').value,
                width: parseInt(document.getElementById('width').value),
                height: parseInt(document.getElementById('height').value),
                stars: parseInt(document.getElementById('stars-3d').value),
                animate: document.getElementById('animate').checked
            };
            
            try {
                const response = await fetch('/generate_3d', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showImage(result.image);
                    showStatus('✅ 3D scene generated successfully!');
                    updateGallery();
                } else {
                    showStatus('❌ ' + result.error, true);
                }
            } catch (error) {
                showStatus('❌ Error: ' + error.message, true);
            }
        }
        
        async function sendToCROD() {
            const input = document.getElementById('chat-message');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Add user message to chat
            const chatContainer = document.getElementById('chat-container');
            chatContainer.innerHTML += `<div class="chat-message user">You: ${message}</div>`;
            input.value = '';
            
            showStatus('🧠 CROD is thinking...');
            
            try {
                const response = await fetch('/crod_chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: message})
                });
                
                const result = await response.json();
                
                if (result.success) {
                    chatContainer.innerHTML += `<div class="chat-message crod">CROD: ${result.response.substring(0, 200)}...</div>`;
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                    
                    if (result.suggestions.length > 0) {
                        showStatus(`💡 CROD suggests: ${result.suggestions.join(', ')}`);
                    } else {
                        showStatus('✅ CROD responded');
                    }
                } else {
                    showStatus('❌ ' + result.error, true);
                }
            } catch (error) {
                showStatus('❌ Error: ' + error.message, true);
            }
        }
        
        async function updateGallery() {
            try {
                const response = await fetch('/gallery');
                const images = await response.json();
                
                const gallery = document.getElementById('gallery');
                gallery.innerHTML = '';
                
                images.forEach(img => {
                    const item = document.createElement('div');
                    item.className = 'gallery-item';
                    item.innerHTML = `
                        <strong>${img.filename}</strong><br>
                        <small>${img.timestamp} - ${img.size} - ${img.type}</small>
                    `;
                    item.onclick = () => window.open(`/download/${img.filename}`);
                    gallery.appendChild(item);
                });
            } catch (error) {
                console.error('Failed to update gallery:', error);
            }
        }
        
        // Update visibility of stars slider
        document.getElementById('object-type').addEventListener('change', function() {
            document.getElementById('stars-group').style.display = 
                this.value === 'dragon_ball' ? 'block' : 'none';
        });
        
        document.getElementById('scene-type').addEventListener('change', function() {
            document.getElementById('stars-3d-group').style.display = 
                this.value === 'dragon_ball' ? 'block' : 'none';
        });
        
        // Enter key for chat
        document.getElementById('chat-message').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendToCROD();
            }
        });
        
        // Initial gallery load
        updateGallery();
    </script>
</body>
</html>
