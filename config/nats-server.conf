# NATS Server Configuration for CROD Polyglot City
port: 4222
monitor_port: 8222

# Clustering
cluster {
  name: "crod-cluster"
  port: 6222
  routes: [
    nats://nats-1:6222
    nats://nats-2:6222
    nats://nats-3:6222
  ]
}

# JetStream
jetstream {
  store_dir: "/data"
  max_memory_store: 1GB
  max_file_store: 10GB
}

# Logging
debug: false
trace: false
logtime: true
log_file: "/var/log/nats-server.log"

# Authorization
authorization {
  default_permissions {
    publish: ">"
    subscribe: ">"
  }
}