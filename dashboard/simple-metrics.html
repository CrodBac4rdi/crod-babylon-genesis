<!DOCTYPE html>
<html>
<head>
    <title>CROD Metrics - NO WEBSOCKET BS</title>
    <style>
        body {
            background: #000;
            color: #0f0;
            font-family: monospace;
            padding: 20px;
        }
        .pod {
            border: 1px solid #0f0;
            padding: 10px;
            margin: 10px 0;
        }
        .offline { border-color: #f00; color: #f00; }
        h1 { text-align: center; }
        #status { text-align: center; margin: 20px; }
    </style>
</head>
<body>
    <h1>CROD LIVE METRICS</h1>
    <div id="status">Loading...</div>
    <div id="metrics"></div>
    
    <script>
        async function fetchMetrics() {
            try {
                const response = await fetch('/api/metrics');
                const data = await response.json();
                
                document.getElementById('status').textContent = `Updated: ${new Date().toLocaleTimeString()}`;
                
                const html = data.pods.map(pod => `
                    <div class="pod ${pod.ready ? '' : 'offline'}">
                        <strong>${pod.name}</strong><br>
                        CPU: ${pod.cpu}<br>
                        Memory: ${pod.memory}<br>
                        Status: ${pod.status}
                    </div>
                `).join('');
                
                document.getElementById('metrics').innerHTML = html;
            } catch (e) {
                document.getElementById('status').textContent = 'ERROR: ' + e.message;
            }
        }
        
        // Update every 2 seconds
        setInterval(fetchMetrics, 2000);
        fetchMetrics();
    </script>
</body>
</html>
