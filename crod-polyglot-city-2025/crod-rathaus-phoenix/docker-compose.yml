version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crod_rathaus_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: "-p 4222 -m 8222"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4222"]
      interval: 5s
      timeout: 5s
      retries: 5

  crod_rathaus:
    build: .
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "postgres://postgres:postgres@postgres/crod_rathaus_dev"
      SECRET_KEY_BASE: "crod-babylon-genesis-2025-development-key-must-be-at-least-64-bytes"
      PHX_HOST: "localhost"
      PORT: "4000"
      NATS_HOST: "nats"
      NATS_PORT: "4222"
      MIX_ENV: "dev"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    volumes:
      - ./lib:/app/lib
      - ./priv:/app/priv
      - ./assets:/app/assets
    command: sh -c "mix ecto.create && mix ecto.migrate && mix phx.server"

volumes:
  postgres_data: