version: '3.8'

services:
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]
    volumes:
      - ./config/nats-server.conf:/etc/nats/nats-server.conf
    networks:
      - crod-network

  crod-rathaus:
    build:
      context: ./crod-rathaus-phoenix
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - PHX_HOST=localhost
      - NATS_HOST=nats
      - NATS_PORT=4222
      - SECRET_KEY_BASE=crod-babylon-genesis-2025-secret-key-base-production-rathaus
      - DATABASE_URL=ecto://postgres:postgres@postgres/crod_rathaus_prod
    depends_on:
      - nats
      - postgres
    networks:
      - crod-network

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=crod_rathaus_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - crod-network

networks:
  crod-network:
    driver: bridge

volumes:
  postgres_data: