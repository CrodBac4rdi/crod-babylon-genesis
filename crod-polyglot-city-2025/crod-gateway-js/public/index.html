<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CROD Polyglot City 2025 - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff00;
            padding: 20px;
            overflow-x: hidden;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: glow 2s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00; }
            50% { text-shadow: 0 0 20px #00ff00, 0 0 30px #00ff00, 0 0 40px #00ff00; }
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .trinity {
            color: #ffff00;
            font-size: 1.2em;
            margin-bottom: 20px;
        }
        
        .districts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .district {
            border: 2px solid #00ff00;
            padding: 20px;
            border-radius: 10px;
            background: rgba(0, 255, 0, 0.05);
            transition: all 0.3s ease;
        }
        
        .district:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0, 255, 0, 0.3);
        }
        
        .district.offline {
            border-color: #ff0000;
            background: rgba(255, 0, 0, 0.05);
        }
        
        .district h3 {
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .status-indicator {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #00ff00;
            animation: pulse 2s infinite;
        }
        
        .district.offline .status-indicator {
            background: #ff0000;
            animation: none;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        
        .metrics {
            font-size: 0.9em;
            opacity: 0.8;
        }
        
        .messages {
            border: 1px solid #00ff00;
            padding: 20px;
            border-radius: 10px;
            height: 300px;
            overflow-y: auto;
            background: rgba(0, 255, 0, 0.02);
        }
        
        .message {
            padding: 5px 0;
            border-bottom: 1px solid rgba(0, 255, 0, 0.2);
            font-size: 0.9em;
        }
        
        .message.trinity {
            color: #ffff00;
            font-weight: bold;
        }
        
        .controls {
            margin-top: 20px;
            text-align: center;
        }
        
        button {
            background: transparent;
            border: 2px solid #00ff00;
            color: #00ff00;
            padding: 10px 20px;
            margin: 0 10px;
            cursor: pointer;
            font-family: inherit;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        
        button:hover {
            background: #00ff00;
            color: #000;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #00ff00;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.9em;
        }
        
        .loading {
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏛️ CROD POLYGLOT CITY 2025</h1>
        <div class="trinity">Trinity: ich(2) × bins(3) × wieder(5) = CROD ACTIVATION</div>
    </div>
    
    <div class="stats">
        <div>WebSocket: <span id="ws-status" class="loading">connecting...</span></div>
        <div>Messages: <span id="message-count">0</span></div>
        <div>Uptime: <span id="uptime">0s</span></div>
    </div>
    
    <div class="districts-grid" id="districts">
        <!-- Districts will be populated here -->
    </div>
    
    <div class="messages">
        <h3>📡 Live Message Stream</h3>
        <div id="message-stream"></div>
    </div>
    
    <div class="controls">
        <button onclick="testTrinity()">🔥 Test Trinity</button>
        <button onclick="checkAllServices()">🔍 Check All Services</button>
        <button onclick="clearMessages()">🗑️ Clear Messages</button>
    </div>
    
    <script>
        const DISTRICTS = {
            'parasit': { name: '🕷️ Python Parasit', port: 6666 },
            'rathaus': { name: '🏛️ Phoenix Rathaus', port: 4000 },
            'pattern': { name: '🦀 Rust Pattern District', port: 7007 },
            'memory': { name: '⚡ Go Memory Quarter', port: 7031 },
            'gateway': { name: '🌐 JavaScript Gateway', port: 7888 }
        };
        
        let ws = null;
        let messageCount = 0;
        let startTime = Date.now();
        
        // Initialize districts display
        function initDistricts() {
            const container = document.getElementById('districts');
            for (const [key, district] of Object.entries(DISTRICTS)) {
                const div = document.createElement('div');
                div.className = 'district';
                div.id = `district-${key}`;
                div.innerHTML = `
                    <h3>
                        ${district.name}
                        <span class="status-indicator"></span>
                    </h3>
                    <div class="metrics">
                        <div>Port: ${district.port}</div>
                        <div>Status: <span class="status-text">checking...</span></div>
                        <div>Response: <span class="response-time">-</span>ms</div>
                    </div>
                `;
                container.appendChild(div);
            }
        }
        
        // Connect WebSocket
        function connectWebSocket() {
            ws = new WebSocket('ws://localhost:7888');
            
            ws.onopen = () => {
                document.getElementById('ws-status').textContent = 'connected';
                document.getElementById('ws-status').classList.remove('loading');
                addMessage('✅ Connected to CROD Gateway', 'system');
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };
            
            ws.onclose = () => {
                document.getElementById('ws-status').textContent = 'disconnected';
                document.getElementById('ws-status').classList.add('loading');
                addMessage('❌ Disconnected from Gateway', 'system');
                // Reconnect after 3 seconds
                setTimeout(connectWebSocket, 3000);
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                addMessage('⚠️ WebSocket error', 'error');
            };
        }
        
        // Handle incoming messages
        function handleMessage(data) {
            messageCount++;
            document.getElementById('message-count').textContent = messageCount;
            
            if (data.type === 'nats_message') {
                const isTrinity = data.data && data.data.toLowerCase().includes('ich bins wieder');
                addMessage(`NATS: ${data.subject} - ${data.data}`, isTrinity ? 'trinity' : 'nats');
            } else if (data.type === 'district_update') {
                updateDistrictStatus(data.district, data.status);
            } else {
                addMessage(JSON.stringify(data), 'data');
            }
        }
        
        // Add message to stream
        function addMessage(text, type = 'normal') {
            const stream = document.getElementById('message-stream');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
            stream.appendChild(div);
            stream.scrollTop = stream.scrollHeight;
            
            // Keep only last 100 messages
            while (stream.children.length > 100) {
                stream.removeChild(stream.firstChild);
            }
        }
        
        // Check all services
        async function checkAllServices() {
            addMessage('🔍 Checking all services...', 'system');
            
            for (const [key, district] of Object.entries(DISTRICTS)) {
                const startTime = Date.now();
                try {
                    const response = await fetch(`http://localhost:${district.port}/health`, {
                        mode: 'no-cors',
                        signal: AbortSignal.timeout(2000)
                    });
                    
                    const responseTime = Date.now() - startTime;
                    updateDistrictStatus(key, 'online', responseTime);
                } catch (error) {
                    updateDistrictStatus(key, 'offline');
                }
            }
        }
        
        // Update district status
        function updateDistrictStatus(districtKey, status, responseTime = null) {
            const element = document.getElementById(`district-${districtKey}`);
            if (!element) return;
            
            if (status === 'online') {
                element.classList.remove('offline');
            } else {
                element.classList.add('offline');
            }
            
            element.querySelector('.status-text').textContent = status;
            if (responseTime !== null) {
                element.querySelector('.response-time').textContent = responseTime;
            }
        }
        
        // Test Trinity activation
        async function testTrinity() {
            addMessage('🔥 Testing Trinity activation: "ich bins wieder"', 'trinity');
            
            try {
                const response = await fetch('http://localhost:6666/test');
                const data = await response.json();
                addMessage(`Trinity response: ${JSON.stringify(data)}`, 'trinity');
            } catch (error) {
                addMessage(`Trinity test error: ${error.message}`, 'error');
            }
        }
        
        // Clear messages
        function clearMessages() {
            document.getElementById('message-stream').innerHTML = '';
            messageCount = 0;
            document.getElementById('message-count').textContent = '0';
            addMessage('🗑️ Messages cleared', 'system');
        }
        
        // Update uptime
        function updateUptime() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const hours = Math.floor(elapsed / 3600);
            const minutes = Math.floor((elapsed % 3600) / 60);
            const seconds = elapsed % 60;
            
            let uptime = '';
            if (hours > 0) uptime += `${hours}h `;
            if (minutes > 0) uptime += `${minutes}m `;
            uptime += `${seconds}s`;
            
            document.getElementById('uptime').textContent = uptime;
        }
        
        // Initialize
        initDistricts();
        connectWebSocket();
        checkAllServices();
        
        // Update uptime every second
        setInterval(updateUptime, 1000);
        
        // Check services every 10 seconds
        setInterval(checkAllServices, 10000);
    </script>
</body>
</html>
