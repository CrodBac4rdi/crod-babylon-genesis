version: '3.8'

services:
  # CROD BRAIN - Elixir Blockchain Core with Innovation Mining
  crod-brain:
    build: ./services/brain
    container_name: crod-brain
    environment:
      - ENABLE_INNOVATION_MINING=true
      - GPU_PASSTHROUGH=true
    ports:
      - "4000:4000"
    volumes:
      - ./creations:/data/creations
      - ./blockchain:/data/blockchain
      - ./88-parameters.json:/app/parameters.json
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - crod-net

  # CREATIVE ENGINE - 3D, Games, Graphics
  creative-engine:
    build: ./services/creative-engine
    container_name: crod-creative
    environment:
      - ENABLE_GPU=true
      - WEBGPU_BACKEND=vulkan
    ports:
      - "8080:8080"
    volumes:
      - ./assets:/app/assets
      - ./projects:/app/projects
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, graphics]
    depends_on:
      - crod-brain
    networks:
      - crod-net

  # AI CONTENT GENERATOR - Stories, PDFs, etc
  ai-generator:
    build: ./services/ai-generator
    container_name: crod-ai-gen
    environment:
      - MODEL_PATH=/models
      - ENABLE_GPU=true
    ports:
      - "7777:7777"
    volumes:
      - ./models:/models
      - ./generated:/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - crod-net

  # REVIEW & LEARNING TRACKER
  review-tracker:
    build: ./services/review-tracker
    container_name: crod-reviews
    environment:
      - BRAIN_URL=http://crod-brain:4000
    ports:
      - "5555:5555"
    volumes:
      - ./reviews:/data/reviews
      - ./learnings:/data/learnings
    networks:
      - crod-net

  # SMART CONTRACT ENGINE
  contract-engine:
    build: ./services/contracts
    container_name: crod-contracts
    environment:
      - BLOCKCHAIN_URL=http://crod-brain:4000
      - ENABLE_INNOVATION_REWARDS=true
    ports:
      - "8545:8545"
    networks:
      - crod-net

  # GAME SERVER
  game-server:
    build: ./services/game-server
    container_name: crod-games
    environment:
      - MULTIPLAYER_ENABLED=false
      - LOCAL_ONLY=true
    ports:
      - "9000:9000"
      - "9001:9001"  # WebRTC
    volumes:
      - ./games:/app/games
    networks:
      - crod-net

  # MEDIA PROCESSOR - GIFs, Videos, etc
  media-processor:
    build: ./services/media-processor
    container_name: crod-media
    environment:
      - FFMPEG_HWACCEL=nvenc
    ports:
      - "6666:6666"
    volumes:
      - ./media:/data/media
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video]
    networks:
      - crod-net

  # MAIN GUI - Tauri Desktop App Backend
  gui-backend:
    build: ./services/gui-backend
    container_name: crod-gui-backend
    environment:
      - FRONTEND_URL=http://localhost:1420
    ports:
      - "3333:3333"
    volumes:
      - ./gui-state:/data/state
    depends_on:
      - crod-brain
      - creative-engine
      - ai-generator
    networks:
      - crod-net

  # Redis for real-time updates
  redis:
    image: redis:alpine
    container_name: crod-redis
    ports:
      - "6379:6379"
    networks:
      - crod-net

  # PostgreSQL for persistent data
  postgres:
    image: postgres:15
    container_name: crod-db
    environment:
      - POSTGRES_DB=crod_creative
      - POSTGRES_USER=crod
      - POSTGRES_PASSWORD=innovation2025
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - crod-net

volumes:
  postgres-data:
  
networks:
  crod-net:
    driver: bridge