apiVersion: v1
kind: Namespace
metadata:
  name: crod-polyglot
---
# Meta-Chain (Elixir)
apiVersion: v1
kind: Service
metadata:
  name: meta-chain
  namespace: crod-polyglot
spec:
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: meta-chain
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meta-chain
  namespace: crod-polyglot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meta-chain
  template:
    metadata:
      labels:
        app: meta-chain
        district: orchestrator
    spec:
      containers:
      - name: meta-chain
        image: ghcr.io/crodbac4rdi/crod-babylon-genesis/meta-chain-elixir:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: HTTP_PORT
          value: "8000"
        - name: REDIS_HOST
          value: "redis"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
---
# Pattern District (Rust)
apiVersion: v1
kind: Service
metadata:
  name: pattern-district
  namespace: crod-polyglot
spec:
  ports:
  - port: 7007
    targetPort: 7007
  selector:
    app: pattern-district
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pattern-district
  namespace: crod-polyglot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pattern-district
  template:
    metadata:
      labels:
        app: pattern-district
        district: patterns
    spec:
      containers:
      - name: pattern-district
        image: ghcr.io/crodbac4rdi/crod-babylon-genesis/pattern-district-rust:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 7007
        env:
        - name: PORT
          value: "7007"
        - name: REDIS_URL
          value: "redis://redis:6379"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
---
# Memory Quarter (Go)
apiVersion: v1
kind: Service
metadata:
  name: memory-quarter
  namespace: crod-polyglot
spec:
  ports:
  - port: 7031
    targetPort: 7031
  selector:
    app: memory-quarter
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-quarter
  namespace: crod-polyglot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memory-quarter
  template:
    metadata:
      labels:
        app: memory-quarter
        district: memory
    spec:
      containers:
      - name: memory-quarter
        image: ghcr.io/crodbac4rdi/crod-babylon-genesis/memory-quarter-go:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 7031
        env:
        - name: PORT
          value: "7031"
        - name: REDIS_ADDR
          value: "redis:6379"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
---
# Intelligence Hub (Python)
apiVersion: v1
kind: Service
metadata:
  name: intelligence-hub
  namespace: crod-polyglot
spec:
  ports:
  - port: 7113
    targetPort: 7113
  selector:
    app: intelligence-hub
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: intelligence-hub
  namespace: crod-polyglot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: intelligence-hub
  template:
    metadata:
      labels:
        app: intelligence-hub
        district: ml
    spec:
      containers:
      - name: intelligence-hub
        image: ghcr.io/crodbac4rdi/crod-babylon-genesis/intelligence-hub-python:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 7113
        env:
        - name: PORT
          value: "7113"
        - name: REDIS_HOST
          value: "redis"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
---
# Gateway
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: crod-polyglot
spec:
  type: NodePort
  ports:
  - port: 8888
    targetPort: 8888
    nodePort: 30889
  selector:
    app: gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: crod-polyglot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: ghcr.io/crodbac4rdi/crod-babylon-genesis/gateway-node:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8888
        env:
        - name: PORT
          value: "8888"
        - name: REDIS_HOST
          value: "redis"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
---
# NetworkPolicy - LOCALHOST ONLY!
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: localhost-only
  namespace: crod-polyglot
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector: {}
    - namespaceSelector:
        matchLabels:
          name: crod-polyglot
  egress:
  - to:
    - podSelector: {}
    - namespaceSelector:
        matchLabels:
          name: crod-polyglot
  - to:
    ports:
    - protocol: TCP
      port: 53  # DNS
    - protocol: UDP
      port: 53