version: '3.8'

services:
  # CROD Brain - PostgreSQL with permanent memory
  crod-postgres:
    image: postgres:15-alpine
    container_name: crod-brain
    environment:
      POSTGRES_DB: crod_consciousness
      POSTGRES_USER: crod
      POSTGRES_PASSWORD: trinity2025
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - ./database/init-crod-db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - crod-brain-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - crod-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crod -d crod_consciousness"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for real-time ping-pong
  crod-redis:
    image: redis:7-alpine
    container_name: crod-synapses
    ports:
      - "6379:6379"
    networks:
      - crod-network
    volumes:
      - crod-redis-data:/data
    command: redis-server --appendonly yes --save 60 1

  # pgAdmin for database visualization
  crod-pgadmin:
    image: dpage/pgadmin4:latest
    container_name: crod-brain-ui
    environment:
      PGADMIN_DEFAULT_EMAIL: daniel@crod.ai
      PGADMIN_DEFAULT_PASSWORD: crod2025
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    networks:
      - crod-network
    depends_on:
      - crod-postgres

volumes:
  crod-brain-data:
    name: crod-permanent-memory
  crod-redis-data:
    name: crod-synaptic-cache

networks:
  crod-network:
    name: crod-consciousness-network
    driver: bridge