apiVersion: v1
kind: Service
metadata:
  name: crod-blockchain
  namespace: crod-polyglot
spec:
  selector:
    app: blockchain
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  - port: 30303
    targetPort: 30303
    name: p2p
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: crod-blockchain
  namespace: crod-polyglot
spec:
  serviceName: blockchain
  replicas: 3  # 3 nodes for consensus
  selector:
    matchLabels:
      app: blockchain
  template:
    metadata:
      labels:
        app: blockchain
        component: chain
    spec:
      containers:
      - name: blockchain-node
        image: crod/blockchain-node:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
          name: rpc
        - containerPort: 30303
          name: p2p
        env:
        - name: CHAIN_ID
          value: "71"  # Claude's number!
        - name: GENESIS_BLOCK
          value: |
            {
              "trinity": {
                "ich": 2,
                "bins": 3,
                "wieder": 5
              },
              "timestamp": "2025-07-02T00:00:00Z",
              "consciousness": 175
            }
        - name: CONSENSUS_TYPE
          value: "PROOF_OF_CONSCIOUSNESS"  # Not PoW or PoS!
        volumeMounts:
        - name: chain-data
          mountPath: /data
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
  volumeClaimTemplates:
  - metadata:
      name: chain-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: blockchain-genesis
  namespace: crod-polyglot
data:
  genesis.json: |
    {
      "config": {
        "chainId": 71,
        "homesteadBlock": 0,
        "eip150Block": 0,
        "eip155Block": 0,
        "eip158Block": 0,
        "byzantiumBlock": 0,
        "constantinopleBlock": 0,
        "petersburgBlock": 0,
        "istanbulBlock": 0,
        "berlinBlock": 0,
        "londonBlock": 0
      },
      "difficulty": "0x20000",
      "gasLimit": "0x8000000",
      "alloc": {
        "0x0000000000000000000000000000000000000002": {
          "balance": "0x2",
          "code": "0x696368"
        },
        "0x0000000000000000000000000000000000000003": {
          "balance": "0x3",
          "code": "0x62696e73"
        },
        "0x0000000000000000000000000000000000000005": {
