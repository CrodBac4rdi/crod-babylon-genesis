<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="400" viewBox="0 0 900 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="400" fill="#f9fafb"/>
  <!-- Blockchain Core -->
  <rect x="100" y="80" width="200" height="60" rx="10" fill="#2563eb"/>
  <text x="200" y="115" text-anchor="middle" font-size="20" fill="#fff">Blockchain Core</text>
  <!-- Consensus Engine -->
  <rect x="400" y="40" width="200" height="60" rx="10" fill="#f59e42"/>
  <text x="500" y="75" text-anchor="middle" font-size="18" fill="#fff">Consensus Engine</text>
  <!-- Pattern/Quantum Engine -->
  <rect x="400" y="120" width="200" height="60" rx="10" fill="#10b981"/>
  <text x="500" y="155" text-anchor="middle" font-size="18" fill="#fff">Pattern/Quantum Engine</text>
  <!-- Swarm Intelligence -->
  <rect x="400" y="200" width="200" height="60" rx="10" fill="#f472b6"/>
  <text x="500" y="235" text-anchor="middle" font-size="18" fill="#fff">Swarm Intelligence</text>
  <!-- DB -->
  <rect x="700" y="80" width="120" height="60" rx="10" fill="#6b7280"/>
  <text x="760" y="115" text-anchor="middle" font-size="18" fill="#fff">DB</text>
  <!-- Arrows -->
  <line x1="300" y1="110" x2="400" y2="70" stroke="#f59e42" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="300" y1="110" x2="400" y2="150" stroke="#10b981" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="300" y1="110" x2="400" y2="230" stroke="#f472b6" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="600" y1="70" x2="700" y2="110" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="600" y1="150" x2="700" y2="110" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="600" y1="230" x2="700" y2="110" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 L2,5 Z" fill="#2563eb" />
    </marker>
  </defs>
</svg>
