<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="500" viewBox="0 0 900 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" fill="#f9fafb"/>
  <!-- GUI -->
  <rect x="50" y="50" width="180" height="60" rx="10" fill="#60a5fa"/>
  <text x="140" y="85" text-anchor="middle" font-size="20" fill="#fff">GUI (React)</text>
  <!-- API Gateway -->
  <rect x="300" y="50" width="180" height="60" rx="10" fill="#2563eb"/>
  <text x="390" y="85" text-anchor="middle" font-size="20" fill="#fff">API-Gateway (Node.js)</text>
  <!-- LLaMA/Pattern (Python) -->
  <rect x="550" y="20" width="180" height="60" rx="10" fill="#f59e42"/>
  <text x="640" y="55" text-anchor="middle" font-size="18" fill="#fff">LLaMA/Pattern (Python)</text>
  <!-- Rust Pattern/Quantum -->
  <rect x="550" y="100" width="180" height="60" rx="10" fill="#10b981"/>
  <text x="640" y="135" text-anchor="middle" font-size="18" fill="#fff">Pattern/Quantum (Rust)</text>
  <!-- Elixir Orchestrator -->
  <rect x="550" y="180" width="180" height="60" rx="10" fill="#a78bfa"/>
  <text x="640" y="215" text-anchor="middle" font-size="18" fill="#fff">Orchestrator (Elixir)</text>
  <!-- Swarm Intelligence -->
  <rect x="550" y="260" width="180" height="60" rx="10" fill="#f472b6"/>
  <text x="640" y="295" text-anchor="middle" font-size="18" fill="#fff">Swarm Intelligence</text>
  <!-- DB -->
  <rect x="300" y="350" width="180" height="60" rx="10" fill="#6b7280"/>
  <text x="390" y="385" text-anchor="middle" font-size="18" fill="#fff">DB (PostGIS/Redis)</text>
  <!-- Arrows -->
  <line x1="230" y1="80" x2="300" y2="80" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="480" y1="80" x2="550" y2="50" stroke="#f59e42" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="480" y1="80" x2="550" y2="130" stroke="#10b981" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="480" y1="80" x2="550" y2="210" stroke="#a78bfa" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="480" y1="80" x2="550" y2="290" stroke="#f472b6" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="390" y1="110" x2="390" y2="350" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 L2,5 Z" fill="#2563eb" />
    </marker>
  </defs>
</svg>
