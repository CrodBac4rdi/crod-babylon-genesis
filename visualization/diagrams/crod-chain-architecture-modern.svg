<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="420" viewBox="0 0 900 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="420" fill="#f3f4f6"/>
  <!-- Blockchain Core -->
  <rect x="60" y="120" width="200" height="80" rx="18" fill="#2563eb" stroke="#1e40af" stroke-width="3"/>
  <text x="160" y="165" text-anchor="middle" font-size="22" fill="#fff" font-weight="bold">⛓ Blockchain Core</text>
  <!-- Consensus Engine -->
  <rect x="320" y="40" width="200" height="80" rx="18" fill="#f59e42" stroke="#b45309" stroke-width="3"/>
  <text x="420" y="85" text-anchor="middle" font-size="20" fill="#fff" font-weight="bold">🤝 Consensus</text>
  <!-- Pattern/Quantum Engine -->
  <rect x="320" y="140" width="200" height="80" rx="18" fill="#10b981" stroke="#047857" stroke-width="3"/>
  <text x="420" y="185" text-anchor="middle" font-size="20" fill="#fff" font-weight="bold">🧬 Pattern/Quantum</text>
  <!-- Swarm Intelligence -->
  <rect x="320" y="240" width="200" height="80" rx="18" fill="#f472b6" stroke="#be185d" stroke-width="3"/>
  <text x="420" y="285" text-anchor="middle" font-size="20" fill="#fff" font-weight="bold">🐝 Swarm</text>
  <!-- DB -->
  <rect x="600" y="120" width="180" height="80" rx="18" fill="#6b7280" stroke="#111827" stroke-width="3"/>
  <text x="690" y="165" text-anchor="middle" font-size="20" fill="#fff" font-weight="bold">🗄 DB</text>
  <!-- Security -->
  <rect x="600" y="240" width="180" height="80" rx="18" fill="#a78bfa" stroke="#6d28d9" stroke-width="3"/>
  <text x="690" y="285" text-anchor="middle" font-size="20" fill="#fff" font-weight="bold">🔒 Security</text>
  <!-- Monitoring -->
  <rect x="600" y="40" width="180" height="80" rx="18" fill="#38bdf8" stroke="#0ea5e9" stroke-width="3"/>
  <text x="690" y="85" text-anchor="middle" font-size="20" fill="#fff" font-weight="bold">📊 Monitoring</text>
  <!-- Arrows -->
  <line x1="260" y1="160" x2="320" y2="80" stroke="#f59e42" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="260" y1="160" x2="320" y2="180" stroke="#10b981" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="260" y1="160" x2="320" y2="280" stroke="#f472b6" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="520" y1="80" x2="600" y2="80" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="520" y1="180" x2="600" y2="160" stroke="#6b7280" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="520" y1="280" x2="600" y2="280" stroke="#a78bfa" stroke-width="4" marker-end="url(#arrow)"/>
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="12" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 L3,6 Z" fill="#111827" />
    </marker>
  </defs>
</svg>
