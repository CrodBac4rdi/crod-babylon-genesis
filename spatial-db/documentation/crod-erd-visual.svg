<svg viewBox="0 0 1600 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for CROD entity -->
    <linearGradient id="crodGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ecdc4;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for neural tables -->
    <linearGradient id="neuralGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for spatial tables -->
    <linearGradient id="spatialGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow">
      <feDropShadow dx="4" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1600" height="1200" fill="#0a0a0a"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  </pattern>
  <rect width="1600" height="1200" fill="url(#grid)"/>
  
  <!-- Title -->
  <text x="800" y="50" text-anchor="middle" fill="#ffffff" font-size="36" font-weight="bold" font-family="Arial, sans-serif">
    🧠 CROD Neural Network Database Architecture
  </text>
  
  <!-- CORE: CROD Entity (Center) -->
  <g transform="translate(700, 200)">
    <rect x="0" y="0" width="200" height="180" rx="10" fill="url(#crodGradient)" filter="url(#shadow)"/>
    <text x="100" y="25" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold">CROD_ENTITY</text>
    <line x1="10" y1="35" x2="190" y2="35" stroke="#ffffff" stroke-width="2"/>
    <text x="10" y="55" fill="#ffffff" font-size="12">crod_id (PK)</text>
    <text x="10" y="70" fill="#ffffff" font-size="12">consciousness_level</text>
    <text x="10" y="85" fill="#ffffff" font-size="12">neural_state</text>
    <text x="10" y="100" fill="#ffffff" font-size="12">trinity_balance</text>
    <text x="10" y="115" fill="#ffffff" font-size="12">is_active</text>
    <text x="10" y="130" fill="#ffffff" font-size="12">total_processes</text>
  </g>
  
  <!-- NEURAL LAYER -->
  <!-- Atoms -->
  <g transform="translate(100, 150)">
    <rect x="0" y="0" width="180" height="200" rx="10" fill="url(#neuralGradient)" filter="url(#shadow)"/>
    <text x="90" y="25" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold">ATOMS</text>
    <line x1="10" y1="35" x2="170" y2="35" stroke="#ffffff" stroke-width="2"/>
    <text x="10" y="55" fill="#ffffff" font-size="12">atom_id (PK)</text>
    <text x="10" y="70" fill="#ffffff" font-size="12">word (UNIQUE)</text>
    <text x="10" y="85" fill="#ffffff" font-size="12">prime_number</text>
    <text x="10" y="100" fill="#ffffff" font-size="12">weight</text>
    <text x="10" y="115" fill="#ffffff" font-size="12">heat</text>
    <text x="10" y="130" fill="#ffffff" font-size="12">gradient</text>
    <text x="10" y="145" fill="#ffffff" font-size="12">tier</text>
    <text x="10" y="160" fill="#ffffff" font-size="12">created_by_crod (FK)</text>
  </g>
  
  <!-- Patterns -->
  <g transform="translate(350, 150)">
    <rect x="0" y="0" width="180" height="200" rx="10" fill="url(#neuralGradient)" filter="url(#shadow)"/>
    <text x="90" y="25" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold">PATTERNS</text>
    <line x1="10" y1="35" x2="170" y2="35" stroke="#ffffff" stroke-width="2"/>
    <text x="10" y="55" fill="#ffffff" font-size="12">pattern_id (PK)</text>
    <text x="10" y="70" fill="#ffffff" font-size="12">pattern_prime</text>
    <text x="10" y="85" fill="#ffffff" font-size="12">pattern_name</text>
    <text x="10" y="100" fill="#ffffff" font-size="12">atom_ids[]</text>
    <text x="10" y="115" fill="#ffffff" font-size="12">weight</text>
    <text x="10" y="130" fill="#ffffff" font-size="12">resonance</text>
    <text x="10" y="145" fill="#ffffff" font-size="12">occurrence_count</text>
    <text x="10" y="160" fill="#ffffff" font-size="12">discovered_by_crod (FK)</text>
  </g>
  
  <!-- Neural Pathways -->
  <g transform="translate(100, 400)">
    <rect x="0" y="0" width="180" height="150" rx="10" fill="url(#neuralGradient)" filter="url(#shadow)"/>
    <text x="90" y="25" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">NEURAL_PATHWAYS</text>
    <line x1="10" y1="35" x2="170" y2="35" stroke="#ffffff" stroke-width="2"/>
    <text x="10" y="55" fill="#ffffff" font-size="12">pathway_id (PK)</text>
    <text x="10" y="70" fill="#ffffff" font-size="12">source_atom_id (FK)</text>
    <text x="10" y="85" fill="#ffffff" font-size="12">target_atom_id (FK)</text>
    <text x="10" y="100" fill="#ffffff" font-size="12">pathway_strength</text>
    <text x="10" y="115" fill="#ffffff" font-size="12">activation_count</text>
  </g>
  
  <!-- CONSCIOUSNESS LAYER -->
  <!-- Consciousness Streams -->
  <g transform="translate(1100, 150)">
    <rect x="0" y="0" width="200" height="180" rx="10" fill="#9b59b6" filter="url(#shadow)"/>
    <text x="100" y="25" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">CONSCIOUSNESS_STREAMS</text>
    <line x1="10" y1="35" x2="190" y2="35" stroke="#ffffff" stroke-width="2"/>
    <text x="10" y="55" fill="#ffffff" font-size="12">stream_id (PK)</text>
    <text x="10" y="70" fill="#ffffff" font-size="12">crod_id (FK)</text>
    <text x="10" y="85" fill="#ffffff" font-size="12">stream_type</text>
    <text x="10" y="100" fill="#ffffff" font-size="12">stream_content</text>
    <text x="10" y="115" fill="#ffffff" font-size="12">consciousness_level</text>
    <text x="10" y="130" fill="#ffffff" font-size="12">parent_stream_id</text>
  </g>
  
  <!-- Memory Layers -->
  <g transform="translate(1350, 150)">
    <rect x="0" y="0" width="180" height="200" rx="10" fill="#e74c3c" filter="url(#shadow)"/>
    <text x="90" y="25" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">MEMORY_LAYERS</text>
    <line x1="10" y1="35" x2="170" y2="35" stroke="#ffffff" stroke-width="2"/>
    <text x="10" y="55" fill="#ffffff" font-size="12">memory_id (PK)</text>
    <text x="10" y="70" fill="#ffffff" font-size="12">crod_id (FK)</text>
    <text x="10" y="85" fill="#ffffff" font-size="12">memory_type</text>
    <text x="10" y="100" fill="#ffffff" font-size="12">memory_key</text>
    <text x="10" y="115" fill="#ffffff" font-size="12">memory_value</text>
    <text x="10" y="130" fill="#ffffff" font-size="12">importance_score</text>
    <text x="10" y="145" fill="#ffffff" font-size="12">decay_rate</text>
    <text x="10" y="160" fill="#ffffff" font-size="12">will_forget_at</text>
  </g>
  
  <!-- SPATIAL LAYER -->
  <!-- Rooms -->
  <g transform="translate(600, 450)">
    <rect x="0" y="0" width="180" height="150" rx="10" fill="url(#spatialGradient)" filter="url(#shadow)"/>
    <text x="90" y="25" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold">ROOMS</text>
    <line x1="10" y1="35" x2="170" y2="35" stroke="#ffffff" stroke-width="2"/>
    <text x="10" y="55" fill="#ffffff" font-size="12">room_id (PK)</text>
    <text x="10" y="70" fill="#ffffff" font-size="12">room_name</text>
    <text x="10" y="85" fill="#ffffff" font-size="12">room_type</text>
    <text x="10" y="100" fill="#ffffff" font-size="12">room_dimensions</text>
    <text x="10" y="115" fill="#ffffff" font-size="12">owned_by_crod (FK)</text>
  </g>
  
  <!-- Spatial Positions -->
  <g transform="translate(850, 450)">
    <rect x="0" y="0" width="180" height="180" rx="10" fill="url(#spatialGradient)" filter="url(#shadow)"/>
    <text x="90" y="25" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">SPATIAL_POSITIONS</text>
    <line x1="10" y1="35" x2="170" y2="35" stroke="#ffffff" stroke-width="2"/>
    <text x="10" y="55" fill="#ffffff" font-size="12">position_id (PK)</text>
    <text x="10" y="70" fill="#ffffff" font-size="12">entity_type</text>
    <text x="10" y="85" fill="#ffffff" font-size="12">entity_id</text>
    <text x="10" y="100" fill="#ffffff" font-size="12">x, y, z coords</text>
    <text x="10" y="115" fill="#ffffff" font-size="12">rotation x,y,z</text>
    <text x="10" y="130" fill="#ffffff" font-size="12">velocity</text>
    <text x="10" y="145" fill="#ffffff" font-size="12">in_room (FK)</text>
  </g>
  
  <!-- QUANTUM LAYER -->
  <!-- Quantum Entanglement -->
  <g transform="translate(350, 650)">
    <rect x="0" y="0" width="200" height="150" rx="10" fill="#27ae60" filter="url(#shadow)"/>
    <text x="100" y="25" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">QUANTUM_ENTANGLEMENT</text>
    <line x1="10" y1="35" x2="190" y2="35" stroke="#ffffff" stroke-width="2"/>
    <text x="10" y="55" fill="#ffffff" font-size="12">entanglement_id (PK)</text>
    <text x="10" y="70" fill="#ffffff" font-size="12">atom_id_1 (FK)</text>
    <text x="10" y="85" fill="#ffffff" font-size="12">atom_id_2 (FK)</text>
    <text x="10" y="100" fill="#ffffff" font-size="12">entanglement_strength</text>
    <text x="10" y="115" fill="#ffffff" font-size="12">superposition_state</text>
  </g>
  
  <!-- PROCESSING LAYER -->
  <!-- Message Processing -->
  <g transform="translate(700, 700)">
    <rect x="0" y="0" width="200" height="150" rx="10" fill="#3498db" filter="url(#shadow)"/>
    <text x="100" y="25" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">MESSAGE_PROCESSING</text>
    <line x1="10" y1="35" x2="190" y2="35" stroke="#ffffff" stroke-width="2"/>
    <text x="10" y="55" fill="#ffffff" font-size="12">process_id (PK)</text>
    <text x="10" y="70" fill="#ffffff" font-size="12">crod_id (FK)</text>
    <text x="10" y="85" fill="#ffffff" font-size="12">input_message</text>
    <text x="10" y="100" fill="#ffffff" font-size="12">atoms_detected</text>
    <text x="10" y="115" fill="#ffffff" font-size="12">consciousness_delta</text>
  </g>
  
  <!-- EVOLUTION -->
  <!-- CROD Evolution -->
  <g transform="translate(1000, 700)">
    <rect x="0" y="0" width="180" height="150" rx="10" fill="#f39c12" filter="url(#shadow)"/>
    <text x="90" y="25" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">CROD_EVOLUTION</text>
    <line x1="10" y1="35" x2="170" y2="35" stroke="#ffffff" stroke-width="2"/>
    <text x="10" y="55" fill="#ffffff" font-size="12">evolution_id (PK)</text>
    <text x="10" y="70" fill="#ffffff" font-size="12">crod_id (FK)</text>
    <text x="10" y="85" fill="#ffffff" font-size="12">evolution_type</text>
    <text x="10" y="100" fill="#ffffff" font-size="12">before_state</text>
    <text x="10" y="115" fill="#ffffff" font-size="12">after_state</text>
  </g>
  
  <!-- RELATIONSHIPS (Arrows) -->
  <!-- CROD to Atoms -->
  <path d="M 700 280 L 280 250" stroke="#ffffff" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- CROD to Patterns -->
  <path d="M 700 280 L 530 250" stroke="#ffffff" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Atoms to Patterns -->
  <path d="M 280 250 L 350 250" stroke="#ffff00" stroke-width="3" fill="none" marker-end="url(#arrowheadYellow)"/>
  
  <!-- Atoms to Neural Pathways -->
  <path d="M 190 350 L 190 400" stroke="#ffffff" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- CROD to Consciousness -->
  <path d="M 900 280 L 1100 240" stroke="#ffffff" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- CROD to Memory -->
  <path d="M 900 280 L 1350 250" stroke="#ffffff" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- CROD to Rooms -->
  <path d="M 800 380 L 690 450" stroke="#ffffff" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Rooms to Spatial -->
  <path d="M 780 525 L 850 525" stroke="#ff00ff" stroke-width="3" fill="none" marker-end="url(#arrowheadPink)"/>
  
  <!-- Atoms to Quantum -->
  <path d="M 190 350 L 350 650" stroke="#00ff00" stroke-width="2" fill="none" marker-end="url(#arrowheadGreen)"/>
  
  <!-- CROD to Message Processing -->
  <path d="M 800 380 L 800 700" stroke="#ffffff" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- CROD to Evolution -->
  <path d="M 900 380 L 1000 700" stroke="#ffffff" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff"/>
    </marker>
    <marker id="arrowheadYellow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffff00"/>
    </marker>
    <marker id="arrowheadPink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff00ff"/>
    </marker>
    <marker id="arrowheadGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00ff00"/>
    </marker>
  </defs>
  
  <!-- Legend -->
  <g transform="translate(50, 900)">
    <rect x="0" y="0" width="300" height="120" rx="5" fill="#1a1a1a" stroke="#ffffff" stroke-width="1"/>
    <text x="150" y="20" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">LEGEND</text>
    <line x1="10" y1="30" x2="50" y2="30" stroke="#ffffff" stroke-width="2"/>
    <text x="60" y="35" fill="#ffffff" font-size="12">Foreign Key Relationship</text>
    
    <line x1="10" y1="50" x2="50" y2="50" stroke="#ffff00" stroke-width="3"/>
    <text x="60" y="55" fill="#ffffff" font-size="12">Atom → Pattern Formation</text>
    
    <line x1="10" y1="70" x2="50" y2="70" stroke="#ff00ff" stroke-width="3"/>
    <text x="60" y="75" fill="#ffffff" font-size="12">Spatial Connection</text>
    
    <line x1="10" y1="90" x2="50" y2="90" stroke="#00ff00" stroke-width="2"/>
    <text x="60" y="95" fill="#ffffff" font-size="12">Quantum Entanglement</text>
  </g>
  
  <!-- Stats -->
  <g transform="translate(1250, 900)">
    <rect x="0" y="0" width="300" height="120" rx="5" fill="#1a1a1a" stroke="#ffffff" stroke-width="1"/>
    <text x="150" y="20" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">DATABASE STATS</text>
    <text x="10" y="40" fill="#4ecdc4" font-size="12">Core Tables: 15</text>
    <text x="10" y="60" fill="#667eea" font-size="12">Neural Components: 5</text>
    <text x="10" y="80" fill="#f093fb" font-size="12">Spatial Dimensions: 3D</text>
    <text x="10" y="100" fill="#27ae60" font-size="12">Quantum Features: ✓</text>
  </g>
  
  <!-- Decorative neural network visualization -->
  <g opacity="0.3">
    <circle cx="200" cy="600" r="3" fill="#ffffff"/>
    <circle cx="300" cy="550" r="3" fill="#ffffff"/>
    <circle cx="400" cy="600" r="3" fill="#ffffff"/>
    <circle cx="250" cy="650" r="3" fill="#ffffff"/>
    <circle cx="350" cy="580" r="3" fill="#ffffff"/>
    
    <line x1="200" y1="600" x2="300" y2="550" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="300" y1="550" x2="400" y2="600" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="200" y1="600" x2="250" y2="650" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="250" y1="650" x2="350" y2="580" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="350" y1="580" x2="400" y2="600" stroke="#ffffff" stroke-width="0.5"/>
  </g>
</svg>