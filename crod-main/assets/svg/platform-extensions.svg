<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3a;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="platformGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a6cf7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#667eea;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="moduleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="serviceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="clientGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="dataGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="600" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="500" y="60" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="white" filter="url(#glow)">CROD Plattform-Erweiterungen</text>
  
  <!-- Central Platform -->
  <circle cx="500" cy="300" r="100" fill="url(#platformGradient)" opacity="0.9" filter="url(#glow)" />
  <text x="500" y="305" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="white">CROD</text>
  
  <!-- Modules -->
  <g id="modules">
    <!-- Auth Module -->
    <circle cx="250" cy="150" r="70" fill="url(#moduleGradient)" opacity="0.8" />
    <text x="250" y="150" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Auth</text>
    <text x="250" y="170" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">Identität</text>
    
    <!-- Collaboration Module -->
    <circle cx="750" cy="150" r="70" fill="url(#moduleGradient)" opacity="0.8" />
    <text x="750" y="150" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Kollaboration</text>
    <text x="750" y="170" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">Echtzeit</text>
    
    <!-- Content Module -->
    <circle cx="750" cy="450" r="70" fill="url(#moduleGradient)" opacity="0.8" />
    <text x="750" y="450" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Content</text>
    <text x="750" y="470" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">Management</text>
    
    <!-- Analytics Module -->
    <circle cx="250" cy="450" r="70" fill="url(#moduleGradient)" opacity="0.8" />
    <text x="250" y="450" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Analytik</text>
    <text x="250" y="470" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">Dashboards</text>
    
    <!-- Workflow Module -->
    <circle cx="500" cy="150" r="60" fill="url(#moduleGradient)" opacity="0.8" />
    <text x="500" y="150" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Workflow</text>
    <text x="500" y="170" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Automatisierung</text>
    
    <!-- AI Module -->
    <circle cx="500" cy="450" r="60" fill="url(#moduleGradient)" opacity="0.8" />
    <text x="500" y="450" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">KI</text>
    <text x="500" y="470" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">ML-Services</text>
  </g>
  
  <!-- Connections -->
  <g id="connections" stroke-width="2" stroke-opacity="0.6">
    <line x1="304" y1="204" x2="430" y2="254" stroke="white" />
    <line x1="696" y1="204" x2="570" y2="254" stroke="white" />
    <line x1="304" y1="396" x2="430" y2="346" stroke="white" />
    <line x1="696" y1="396" x2="570" y2="346" stroke="white" />
    <line x1="500" y1="210" x2="500" y2="240" stroke="white" />
    <line x1="500" y1="390" x2="500" y2="360" stroke="white" />
  </g>
  
  <!-- Animated Particles -->
  <g id="particles">
    <circle cx="350" cy="220" r="4" fill="white" opacity="0.7">
      <animate attributeName="cx" values="350;430;350" dur="3s" repeatCount="indefinite" />
      <animate attributeName="cy" values="220;254;220" dur="3s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="650" cy="220" r="4" fill="white" opacity="0.7">
      <animate attributeName="cx" values="650;570;650" dur="4s" repeatCount="indefinite" />
      <animate attributeName="cy" values="220;254;220" dur="4s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="350" cy="380" r="4" fill="white" opacity="0.7">
      <animate attributeName="cx" values="350;430;350" dur="3.5s" repeatCount="indefinite" />
      <animate attributeName="cy" values="380;346;380" dur="3.5s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="650" cy="380" r="4" fill="white" opacity="0.7">
      <animate attributeName="cx" values="650;570;650" dur="4.5s" repeatCount="indefinite" />
      <animate attributeName="cy" values="380;346;380" dur="4.5s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="500" cy="230" r="4" fill="white" opacity="0.7">
      <animate attributeName="cy" values="230;250;230" dur="2s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="500" cy="370" r="4" fill="white" opacity="0.7">
      <animate attributeName="cy" values="370;350;370" dur="2.5s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Footer -->
  <text x="500" y="550" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="white" opacity="0.7">10 Kernerweiterungen für vollständige Plattform-Funktionalität</text>
  <text x="500" y="580" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="white" opacity="0.5">Identität • Kollaboration • Content • Analytik • Workflow • KI • Mobile • Integration • DevOps • Security</text>
</svg>
