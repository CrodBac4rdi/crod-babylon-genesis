name: 🐋 Build & Push to GitHub Container Registry

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: 🏗️ Build & Push Districts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: meta-chain-elixir
            context: ./pod-sources/meta-chain
            dockerfile: Dockerfile
          - name: pattern-district-rust
            context: ./pod-sources/pattern-district
            dockerfile: Dockerfile
          - name: memory-quarter-go
            context: ./pod-sources/memory-quarter
            dockerfile: Dockerfile
          - name: intelligence-hub-python
            context: ./pod-sources/intelligence-hub
            dockerfile: Dockerfile
          - name: gateway-node
            context: ./pod-sources/gateway
            dockerfile: Dockerfile
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 📦 Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-

      - name: 🐋 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  update-k8s-manifests:
    name: 📝 Update K8s Manifests
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔄 Update image references
        run: |
          # Update all K8s manifests to use ghcr.io images
          for file in k8s/*.yaml; do
            # Replace local image references with ghcr.io
            sed -i "s|image: crod/|image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/|g" $file
            sed -i "s|imagePullPolicy: Never|imagePullPolicy: Always|g" $file
          done

      - name: 📤 Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          title: "🔄 Update K8s manifests to use GitHub Container Registry"
          body: |
            ## Updates K8s manifests to use ghcr.io images
            
            This PR updates all Kubernetes manifests to use images from GitHub Container Registry instead of local images.
            
            ### Changes:
            - Updated image references from `crod/*` to `ghcr.io/${{ github.repository_owner }}/*`
            - Changed `imagePullPolicy` from `Never` to `Always`
            
            🤖 Generated by GitHub Actions
          branch: update-k8s-manifests
          commit-message: "🔄 Update K8s manifests to use ghcr.io images"