name: 🚀 CROD MEGA BUILD - Complete Blockchain System

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: crodbac4rdi/crod-babylon-genesis

jobs:
  mega-build:
    name: 🏗️ Build ALL CROD Components
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # POLYGLOT CITY DISTRICTS
          - name: meta-chain-elixir
            context: ./pod-sources/meta-chain
            dockerfile: Dockerfile
            category: polyglot-city
            
          - name: pattern-district-rust
            context: ./pod-sources/pattern-district
            dockerfile: Dockerfile
            category: polyglot-city
            
          - name: memory-quarter-go
            context: ./pod-sources/memory-quarter
            dockerfile: Dockerfile
            category: polyglot-city
            
          - name: intelligence-hub-python
            context: ./pod-sources/intelligence-hub
            dockerfile: Dockerfile
            category: polyglot-city
            
          - name: gateway-node
            context: ./pod-sources/gateway
            dockerfile: Dockerfile
            category: polyglot-city
            
          - name: llama-district
            context: ./pod-sources/llama-district
            dockerfile: Dockerfile
            category: polyglot-city

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: 📦 Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ matrix.category }}-latest

      - name: 🐋 Build & Push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  deploy-to-k8s:
    name: 🚀 Deploy Complete CROD System
    needs: mega-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && needs.mega-build.result == 'success'
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: 🏗️ Create Deployment Manifests
        run: |
          mkdir -p k8s-deploy
          
          # Create namespace
          cat > k8s-deploy/00-namespace.yaml << EOF
          apiVersion: v1
          kind: Namespace
          metadata:
            name: crod-polyglot
            labels:
              crod-version: mega
              managed-by: github-actions
          EOF
          
          # Create Redis
          cat > k8s-deploy/01-redis.yaml << EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: redis
            namespace: crod-polyglot
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: redis
            template:
              metadata:
                labels:
                  app: redis
              spec:
                containers:
                - name: redis
                  image: redis:7-alpine
                  ports:
                  - containerPort: 6379
                  resources:
                    requests:
                      memory: "256Mi"
                      cpu: "100m"
                    limits:
                      memory: "512Mi"
                      cpu: "500m"
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: redis
            namespace: crod-polyglot
          spec:
            selector:
              app: redis
            ports:
            - port: 6379
              targetPort: 6379
          EOF
          
          # Create deployments for all districts
          for district in meta-chain pattern-district memory-quarter intelligence-hub gateway llama-district; do
            cat > k8s-deploy/deploy-${district}.yaml << EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${district}
            namespace: crod-polyglot
            labels:
              app: ${district}
              crod-component: polyglot-city
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: ${district}
            template:
              metadata:
                labels:
                  app: ${district}
              spec:
                containers:
                - name: ${district}
                  image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${district}:latest
                  imagePullPolicy: Always
                  env:
                  - name: REDIS_URL
                    value: redis://redis:6379
                  - name: DISTRICT_NAME
                    value: ${district}
                  resources:
                    requests:
                      memory: "256Mi"
                      cpu: "100m"
                    limits:
                      memory: "1Gi"
                      cpu: "1000m"
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${district}
            namespace: crod-polyglot
          spec:
            selector:
              app: ${district}
            ports:
            - port: 8080
              targetPort: 8080
          EOF
          done
          
          # Create Gateway NodePort
          cat > k8s-deploy/gateway-nodeport.yaml << EOF
          apiVersion: v1
          kind: Service
          metadata:
            name: gateway-nodeport
            namespace: crod-polyglot
          spec:
            type: NodePort
            selector:
              app: gateway
            ports:
            - port: 8888
              targetPort: 8080
              nodePort: 30888
          EOF

      - name: 📋 Show Deployment Plan
        run: |
          echo "🏙️ CROD MEGA DEPLOYMENT PLAN:"
          echo "================================"
          ls -la k8s-deploy/
          echo ""
          echo "Images to deploy:"
          echo "- Redis (Official)"
          echo "- Meta Chain (Elixir)"
          echo "- Pattern District (Rust)"
          echo "- Memory Quarter (Go)"
          echo "- Intelligence Hub (Python)"
          echo "- Gateway (Node.js)"
          echo "- LLAMA District (AI)"
          echo ""
          echo "Access points:"
          echo "- Gateway: http://localhost:30888"
          echo "- Internal: crod-polyglot.svc.cluster.local"

      - name: 💾 Upload K8s Manifests
        uses: actions/upload-artifact@v3
        with:
          name: k8s-manifests
          path: k8s-deploy/

  cleanup:
    name: 🧹 Cleanup Old Workflows
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        
      - name: 🗑️ Remove Duplicate Workflows
        run: |
          # Backup old workflows
          mkdir -p .github/workflows/archive
          
          # Move old workflows to archive (keep mega-build)
          for file in .github/workflows/*.yml; do
            if [[ ! "$file" =~ "crod-mega-build.yml" ]]; then
              mv "$file" .github/workflows/archive/ || true
            fi
          done
          
          echo "✅ Cleaned up duplicate workflows!"
          
      - name: 📝 Create README for Workflows
        run: |
          cat > .github/workflows/README.md << 'EOF'
          # CROD GitHub Workflows
          
          ## 🚀 MEGA BUILD (The Only One You Need!)
          
          **crod-mega-build.yml** - Builds EVERYTHING:
          - All Polyglot City Districts
          - Automatic deployment to K8s
          - Multi-architecture support (amd64 + arm64)
          - GitHub Container Registry push
          - Complete cleanup of old stuff
          
          ### Usage:
          ```bash
          # Automatic on push to main
          git push
          
          # Manual trigger
          gh workflow run crod-mega-build.yml
          ```
          
          ### What it builds:
          - 🧠 Meta Chain (Elixir) - The brain
          - ⚡ Pattern District (Rust) - Fast pattern matching
          - 🔄 Memory Quarter (Go) - Concurrent memory
          - 🤖 Intelligence Hub (Python) - ML/AI
          - 🌐 Gateway (Node.js) - API endpoint
          - 🦙 LLAMA District - Local AI model
          
          ### Old workflows (archived):
          Check `.github/workflows/archive/` for old workflows.
          EOF

      - name: 💾 Commit Workflow Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add .github/workflows/
          git diff --staged --quiet || git commit -m "feat: MEGA BUILD workflow - consolidate all builds

          - Single workflow for ALL CROD components
          - Automatic K8s deployment
          - Multi-arch support
          - Cleanup of duplicate workflows
          - Archive old workflows for reference
          
          🚀 CROD MEGA BUILD is the way!"
          
          git push || echo "No changes to push"