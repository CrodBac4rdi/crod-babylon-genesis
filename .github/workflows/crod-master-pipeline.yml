          Q = K = V = np.random.randn(10, d_k)
          attn_out, attn_weights = attention(Q, K, V, d_k)
          print("✅ Attention mechanism computed")
          
          print("\n🔥 Advanced features ready for CROD Neural Core!")
          EOF
          
