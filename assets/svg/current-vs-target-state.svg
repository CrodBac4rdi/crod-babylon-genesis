<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="600" viewBox="0 0 1400 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="currentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="targetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Arrow pattern -->
    <pattern id="arrowPattern" x="0" y="0" width="40" height="20" patternUnits="userSpaceOnUse">
      <path d="M 0,10 L 20,10 L 15,5 M 20,10 L 15,15" stroke="#fff" stroke-width="2" fill="none" opacity="0.5"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1400" height="600" fill="#1a1f3a"/>
  
  <!-- Title -->
  <text x="700" y="40" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#fff">
    CROD Status: Current vs Target State
  </text>
  
  <!-- Current State (Left) -->
  <g transform="translate(100, 80)">
    <rect x="0" y="0" width="500" height="480" rx="20" fill="#2c3e50" stroke="#e74c3c" stroke-width="3"/>
    <text x="250" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#e74c3c">
      Current State (Juli 2025)
    </text>
    
    <!-- Running Services -->
    <g transform="translate(30, 80)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff">🏃 Running (2 Services)</text>
      
      <!-- Mock Blockchain -->
      <g transform="translate(20, 30)">
        <circle cx="10" cy="10" r="8" fill="#2ecc71"/>
        <text x="30" y="15" font-family="Arial, sans-serif" font-size="16" fill="#ecf0f1">Mock Blockchain API (Port 3001)</text>
        <text x="50" y="35" font-family="Arial, sans-serif" font-size="14" fill="#95a5a6">Node.js - Simulated blockchain</text>
      </g>
      
      <!-- Web Studio -->
      <g transform="translate(20, 70)">
        <circle cx="10" cy="10" r="8" fill="#2ecc71"/>
        <text x="30" y="15" font-family="Arial, sans-serif" font-size="16" fill="#ecf0f1">CROD Web Studio (Port 5000)</text>
        <text x="50" y="35" font-family="Arial, sans-serif" font-size="14" fill="#95a5a6">Python Flask - Visualizations</text>
      </g>
    </g>
    
    <!-- Ready but Not Connected -->
    <g transform="translate(30, 230)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff">📦 Ready but Disconnected (5+)</text>
      
      <g transform="translate(20, 30)">
        <circle cx="10" cy="10" r="8" fill="#f39c12"/>
        <text x="30" y="15" font-family="Arial, sans-serif" font-size="16" fill="#ecf0f1">Elixir Blockchain (Complete)</text>
      </g>
      
      <g transform="translate(20, 60)">
        <circle cx="10" cy="10" r="8" fill="#f39c12"/>
        <text x="30" y="15" font-family="Arial, sans-serif" font-size="16" fill="#ecf0f1">Go CLI Tools (4/5 compiled)</text>
      </g>
      
      <g transform="translate(20, 90)">
        <circle cx="10" cy="10" r="8" fill="#f39c12"/>
        <text x="30" y="15" font-family="Arial, sans-serif" font-size="16" fill="#ecf0f1">Tauri Desktop App (Ready)</text>
      </g>
      
      <g transform="translate(20, 120)">
        <circle cx="10" cy="10" r="8" fill="#f39c12"/>
        <text x="30" y="15" font-family="Arial, sans-serif" font-size="16" fill="#ecf0f1">Python Visualizers (All working)</text>
      </g>
      
      <g transform="translate(20, 150)">
        <circle cx="10" cy="10" r="8" fill="#f39c12"/>
        <text x="30" y="15" font-family="Arial, sans-serif" font-size="16" fill="#ecf0f1">CROD Parasite (Learning System)</text>
      </g>
    </g>
    
    <!-- Problems -->
    <g transform="translate(30, 420)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e74c3c">⚠️ Problems:</text>
      <text x="20" y="25" font-family="Arial, sans-serif" font-size="14" fill="#ecf0f1">• No inter-service communication</text>
      <text x="20" y="45" font-family="Arial, sans-serif" font-size="14" fill="#ecf0f1">• No persistence layer</text>
      <text x="20" y="65" font-family="Arial, sans-serif" font-size="14" fill="#ecf0f1">• Services run in isolation</text>
    </g>
  </g>
  
  <!-- Arrow -->
  <g transform="translate(650, 300)">
    <rect x="0" y="-20" width="100" height="40" fill="url(#arrowPattern)"/>
    <path d="M 0,0 L 80,0 L 70,-10 M 80,0 L 70,10" stroke="#fff" stroke-width="4" fill="none" filter="url(#glow)"/>
  </g>
  
  <!-- Target State (Right) -->
  <g transform="translate(800, 80)">
    <rect x="0" y="0" width="500" height="480" rx="20" fill="#2c3e50" stroke="#2ecc71" stroke-width="3"/>
    <text x="250" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2ecc71">
      Target State (After Integration)
    </text>
    
    <!-- Integrated System -->
    <g transform="translate(30, 80)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff">🚀 Fully Integrated System</text>
      
      <!-- All Services Running -->
      <g transform="translate(20, 30)">
        <circle cx="10" cy="10" r="8" fill="#2ecc71" filter="url(#glow)"/>
        <text x="30" y="15" font-family="Arial, sans-serif" font-size="16" fill="#ecf0f1">Meta-Chain (Elixir) - Port 8000</text>
      </g>
      
      <g transform="translate(20, 60)">
        <circle cx="10" cy="10" r="8" fill="#2ecc71" filter="url(#glow)"/>
        <text x="30" y="15" font-family="Arial, sans-serif" font-size="16" fill="#ecf0f1">Pattern District (Rust) - Port 7007</text>
      </g>
      
      <g transform="translate(20, 90)">
        <circle cx="10" cy="10" r="8" fill="#2ecc71" filter="url(#glow)"/>
        <text x="30" y="15" font-family="Arial, sans-serif" font-size="16" fill="#ecf0f1">Memory Quarter (Go) - Port 7031</text>
      </g>
      
      <g transform="translate(20, 120)">
        <circle cx="10" cy="10" r="8" fill="#2ecc71" filter="url(#glow)"/>
        <text x="30" y="15" font-family="Arial, sans-serif" font-size="16" fill="#ecf0f1">Intelligence Hub (Python) - Port 7113</text>
      </g>
      
      <g transform="translate(20, 150)">
        <circle cx="10" cy="10" r="8" fill="#2ecc71" filter="url(#glow)"/>
        <text x="30" y="15" font-family="Arial, sans-serif" font-size="16" fill="#ecf0f1">Gateway (Node.js) - Port 8888</text>
      </g>
    </g>
    
    <!-- Infrastructure -->
    <g transform="translate(30, 280)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff">🏗️ Infrastructure</text>
      
      <g transform="translate(20, 30)">
        <rect x="5" y="5" width="10" height="10" fill="#3498db"/>
        <text x="30" y="15" font-family="Arial, sans-serif" font-size="16" fill="#ecf0f1">Message Bus (NATS/Redis)</text>
      </g>
      
      <g transform="translate(20, 60)">
        <rect x="5" y="5" width="10" height="10" fill="#3498db"/>
        <text x="30" y="15" font-family="Arial, sans-serif" font-size="16" fill="#ecf0f1">Docker Containers</text>
      </g>
      
      <g transform="translate(20, 90)">
        <rect x="5" y="5" width="10" height="10" fill="#3498db"/>
        <text x="30" y="15" font-family="Arial, sans-serif" font-size="16" fill="#ecf0f1">Kubernetes Orchestration</text>
      </g>
    </g>
    
    <!-- Benefits -->
    <g transform="translate(30, 420)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2ecc71">✅ Benefits:</text>
      <text x="20" y="25" font-family="Arial, sans-serif" font-size="14" fill="#ecf0f1">• Real-time communication</text>
      <text x="20" y="45" font-family="Arial, sans-serif" font-size="14" fill="#ecf0f1">• Persistent data storage</text>
      <text x="20" y="65" font-family="Arial, sans-serif" font-size="14" fill="#ecf0f1">• Scalable architecture</text>
    </g>
  </g>
  
  <!-- Progress Bar -->
  <g transform="translate(100, 570)">
    <text x="0" y="-10" font-family="Arial, sans-serif" font-size="16" fill="#ecf0f1">Integration Progress:</text>
    <rect x="150" y="-25" width="400" height="30" rx="15" fill="#34495e" stroke="#7f8c8d" stroke-width="2"/>
    <rect x="150" y="-25" width="80" height="30" rx="15" fill="url(#targetGrad)" filter="url(#glow)"/>
    <text x="570" y="-5" font-family="Arial, sans-serif" font-size="16" fill="#ecf0f1">20% (Phase 1/4)</text>
  </g>
</svg>