<svg width="1200" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="300" fill="url(#bannerGrad)" rx="20"/>
  
  <!-- CROD Text -->
  <text x="600" y="140" font-family="Arial Black, sans-serif" font-size="120" font-weight="900" text-anchor="middle" fill="white" filter="url(#glow)">CROD</text>
  
  <!-- Subtitle -->
  <text x="600" y="200" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="white" opacity="0.9">Consciousness Revolution On Demand</text>
  
  <!-- Quantum particles -->
  <circle cx="150" cy="150" r="30" fill="none" stroke="white" stroke-width="2" opacity="0.3">
    <animate attributeName="r" values="30;50;30" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="1050" cy="150" r="40" fill="none" stroke="white" stroke-width="2" opacity="0.3">
    <animate attributeName="r" values="40;60;40" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Version badge -->
  <rect x="520" y="240" width="160" height="30" fill="rgba(255,255,255,0.2)" rx="15"/>
  <text x="600" y="259" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="white">v0.4.0 - July 2025</text>
</svg>