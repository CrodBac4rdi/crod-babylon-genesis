<svg width="700" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="700" height="400" fill="#f7fafc"/>
  
  <!-- Title -->
  <text x="350" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#2d3748">Development Progress</text>
  
  <!-- Grid -->
  <line x1="80" y1="350" x2="650" y2="350" stroke="#e2e8f0" stroke-width="2"/>
  <line x1="80" y1="70" x2="80" y2="350" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Y-axis labels -->
  <text x="70" y="75" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#718096">100%</text>
  <text x="70" y="145" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#718096">75%</text>
  <text x="70" y="215" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#718096">50%</text>
  <text x="70" y="285" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#718096">25%</text>
  <text x="70" y="355" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#718096">0%</text>
  
  <!-- Bars -->
  <!-- Core Blockchain (100%) -->
  <rect x="120" y="70" width="80" height="280" fill="#48bb78" rx="5"/>
  <text x="160" y="370" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2d3748">Core</text>
  <text x="160" y="385" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2d3748">Blockchain</text>
  
  <!-- NATS (70%) -->
  <rect x="240" y="154" width="80" height="196" fill="#4299e1" rx="5"/>
  <text x="280" y="370" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2d3748">NATS</text>
  <text x="280" y="385" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2d3748">Integration</text>
  
  <!-- Quantum (40%) -->
  <rect x="360" y="238" width="80" height="112" fill="#9f7aea" rx="5"/>
  <text x="400" y="370" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2d3748">Quantum</text>
  <text x="400" y="385" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2d3748">Mining</text>
  
  <!-- Post-Quantum (30%) -->
  <rect x="480" y="266" width="80" height="84" fill="#ed8936" rx="5"/>
  <text x="520" y="370" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2d3748">Post-Quantum</text>
  <text x="520" y="385" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2d3748">Crypto</text>
  
  <!-- Desktop (10%) -->
  <rect x="600" y="322" width="80" height="28" fill="#e53e3e" rx="5"/>
  <text x="640" y="370" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2d3748">Desktop</text>
  <text x="640" y="385" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2d3748">Client</text>
  
  <!-- Progress values -->
  <text x="160" y="60" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#48bb78">100%</text>
  <text x="280" y="144" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#4299e1">70%</text>
  <text x="400" y="228" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#9f7aea">40%</text>
  <text x="520" y="256" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#ed8936">30%</text>
  <text x="640" y="312" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#e53e3e">10%</text>
</svg>