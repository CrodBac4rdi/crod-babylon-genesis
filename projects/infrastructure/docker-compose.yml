version: '3.8'

services:
  # CROD Blockchain API
  blockchain-api:
    image: elixir:1.15-alpine
    container_name: crod-blockchain-api
    volumes:
      - ../blockchain-core:/app
    working_dir: /app
    ports:
      - "8001:8001"
    command: elixir simple_api_v2.ex
    networks:
      - crod-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8001/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Web Interface (Simple HTTP Server for now)
  web-interface:
    image: nginx:alpine
    container_name: crod-web-interface
    volumes:
      - ../web-interface:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "4000:80"
    networks:
      - crod-network
    depends_on:
      - blockchain-api
    restart: unless-stopped

  # PostgreSQL Database (for future persistence)
  postgres:
    image: postgres:15-alpine
    container_name: crod-postgres
    environment:
      POSTGRES_USER: crod
      POSTGRES_PASSWORD: crod2025
      POSTGRES_DB: crod_blockchain
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - crod-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crod"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for caching and pub/sub)
  redis:
    image: redis:7-alpine
    container_name: crod-redis
    ports:
      - "6379:6379"
    networks:
      - crod-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # NATS (for future message bus)
  nats:
    image: nats:2.10-alpine
    container_name: crod-nats
    ports:
      - "4222:4222"
      - "8222:8222"  # Monitoring
    command: "--cluster_name CROD --http_port 8222"
    networks:
      - crod-network
    restart: unless-stopped

  # Prometheus (Monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: crod-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - crod-network
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana (Visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: crod-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=crod2025
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - crod-network
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  crod-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
  prometheus_data:
  grafana_data: