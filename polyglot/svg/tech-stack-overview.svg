<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="700" viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Language/Tech specific gradients -->
    <linearGradient id="elixirColor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="rustColor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="goColor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="pythonColor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1c40f;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="jsColor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="700" fill="#0f1419"/>
  
  <!-- Title -->
  <text x="500" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#fff">
    CROD Technology Stack
  </text>
  <text x="500" y="65" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#95a5a6">
    Polyglot Architecture with Best-in-Class Technologies
  </text>
  
  <!-- Core Languages Section -->
  <g transform="translate(50, 100)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ecf0f1">Core Languages</text>
    
    <!-- Elixir -->
    <g transform="translate(0, 30)">
      <rect x="0" y="0" width="180" height="80" rx="10" fill="url(#elixirColor)" filter="url(#glow)"/>
      <text x="90" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#fff">Elixir</text>
      <text x="90" y="50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ecf0f1">Blockchain Core</text>
      <text x="90" y="65" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#bdc3c7">Phoenix, NATS, Quantum</text>
    </g>
    
    <!-- Go -->
    <g transform="translate(200, 30)">
      <rect x="0" y="0" width="180" height="80" rx="10" fill="url(#goColor)" filter="url(#glow)"/>
      <text x="90" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#fff">Go</text>
      <text x="90" y="50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ecf0f1">CLI & Monitoring</text>
      <text x="90" y="65" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#bdc3c7">High Performance</text>
    </g>
    
    <!-- Python -->
    <g transform="translate(400, 30)">
      <rect x="0" y="0" width="180" height="80" rx="10" fill="url(#pythonColor)" filter="url(#glow)"/>
      <text x="90" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#fff">Python</text>
      <text x="90" y="50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ecf0f1">ML/AI & Visualization</text>
      <text x="90" y="65" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#bdc3c7">NumPy, Matplotlib, Plotly</text>
    </g>
    
    <!-- JavaScript -->
    <g transform="translate(600, 30)">
      <rect x="0" y="0" width="180" height="80" rx="10" fill="url(#jsColor)" filter="url(#glow)"/>
      <text x="90" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#fff">JavaScript</text>
      <text x="90" y="50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ecf0f1">Neural Net & API</text>
      <text x="90" y="65" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#bdc3c7">Node.js, React, TypeScript</text>
    </g>
    
    <!-- Rust (Planned) -->
    <g transform="translate(800, 30)">
      <rect x="0" y="0" width="130" height="80" rx="10" fill="url(#rustColor)" opacity="0.5" stroke-dasharray="5,5" stroke="#e74c3c" stroke-width="2"/>
      <text x="65" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#fff" opacity="0.7">Rust</text>
      <text x="65" y="50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ecf0f1" opacity="0.7">Pattern Engine</text>
      <text x="65" y="65" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#bdc3c7" opacity="0.7">(Planned)</text>
    </g>
  </g>
  
  <!-- Infrastructure -->
  <g transform="translate(50, 250)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ecf0f1">Infrastructure & Tools</text>
    
    <!-- Row 1 -->
    <g transform="translate(0, 30)">
      <!-- Docker -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="140" height="60" rx="8" fill="#2c3e50" stroke="#3498db" stroke-width="2"/>
        <text x="70" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#3498db">🐳 Docker</text>
        <text x="70" y="45" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#ecf0f1">Containerization</text>
      </g>
      
      <!-- Kubernetes -->
      <g transform="translate(160, 0)">
        <rect x="0" y="0" width="140" height="60" rx="8" fill="#2c3e50" stroke="#3498db" stroke-width="2"/>
        <text x="70" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#3498db">☸️ Kubernetes</text>
        <text x="70" y="45" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#ecf0f1">Orchestration</text>
      </g>
      
      <!-- NATS -->
      <g transform="translate(320, 0)">
        <rect x="0" y="0" width="140" height="60" rx="8" fill="#2c3e50" stroke="#00d9ff" stroke-width="2"/>
        <text x="70" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#00d9ff">NATS</text>
        <text x="70" y="45" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#ecf0f1">Message Bus</text>
      </g>
      
      <!-- Redis -->
      <g transform="translate(480, 0)">
        <rect x="0" y="0" width="140" height="60" rx="8" fill="#2c3e50" stroke="#e74c3c" stroke-width="2"/>
        <text x="70" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#e74c3c">Redis</text>
        <text x="70" y="45" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#ecf0f1">Cache/Queue</text>
      </g>
    </g>
    
    <!-- Row 2 -->
    <g transform="translate(0, 110)">
      <!-- PostgreSQL -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="140" height="60" rx="8" fill="#2c3e50" stroke="#3498db" stroke-width="2"/>
        <text x="70" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#3498db">🐘 PostgreSQL</text>
        <text x="70" y="45" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#ecf0f1">Database</text>
      </g>
      
      <!-- Prometheus -->
      <g transform="translate(160, 0)">
        <rect x="0" y="0" width="140" height="60" rx="8" fill="#2c3e50" stroke="#e67e22" stroke-width="2"/>
        <text x="70" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#e67e22">Prometheus</text>
        <text x="70" y="45" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#ecf0f1">Monitoring</text>
      </g>
      
      <!-- Grafana -->
      <g transform="translate(320, 0)">
        <rect x="0" y="0" width="140" height="60" rx="8" fill="#2c3e50" stroke="#f39c12" stroke-width="2"/>
        <text x="70" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#f39c12">Grafana</text>
        <text x="70" y="45" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#ecf0f1">Dashboards</text>
      </g>
    </g>
  </g>
  
  <!-- 2025 Technologies -->
  <g transform="translate(50, 480)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ecf0f1">2025 Cutting-Edge Tech</text>
    
    <g transform="translate(0, 30)">
      <!-- MCP -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="200" height="50" rx="8" fill="#1abc9c" filter="url(#glow)"/>
        <text x="100" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">MCP Protocol</text>
        <text x="100" y="35" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#ecf0f1">Universal Tool Access</text>
      </g>
      
      <!-- A2A -->
      <g transform="translate(220, 0)">
        <rect x="0" y="0" width="200" height="50" rx="8" fill="#9b59b6" filter="url(#glow)"/>
        <text x="100" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">A2A Protocol</text>
        <text x="100" y="35" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#ecf0f1">Agent-to-Agent Comm</text>
      </g>
      
      <!-- Quantum Neural -->
      <g transform="translate(440, 0)">
        <rect x="0" y="0" width="200" height="50" rx="8" fill="#e74c3c" filter="url(#glow)"/>
        <text x="100" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">Quantum Neural</text>
        <text x="100" y="35" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#ecf0f1">1000x Acceleration</text>
      </g>
    </g>
  </g>
  
  <!-- Key Numbers -->
  <g transform="translate(50, 600)">
    <rect x="0" y="0" width="900" height="80" rx="10" fill="#34495e" opacity="0.5"/>
    
    <g transform="translate(50, 25)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2ecc71">88</text>
      <text x="0" y="20" font-family="Arial, sans-serif" font-size="12" fill="#ecf0f1">Parameters</text>
    </g>
    
    <g transform="translate(200, 25)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#3498db">5+</text>
      <text x="0" y="20" font-family="Arial, sans-serif" font-size="12" fill="#ecf0f1">Languages</text>
    </g>
    
    <g transform="translate(350, 25)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#f39c12">10+</text>
      <text x="0" y="20" font-family="Arial, sans-serif" font-size="12" fill="#ecf0f1">Services</text>
    </g>
    
    <g transform="translate(500, 25)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#e74c3c">MIT/Apache</text>
      <text x="0" y="20" font-family="Arial, sans-serif" font-size="12" fill="#ecf0f1">Open Source Libs</text>
    </g>
    
    <g transform="translate(700, 25)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#9b59b6">∞</text>
      <text x="0" y="20" font-family="Arial, sans-serif" font-size="12" fill="#ecf0f1">Possibilities</text>
    </g>
  </g>
</svg>