<svg width="700" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="700" height="300" fill="#f7fafc"/>
  
  <!-- Title -->
  <text x="350" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#2d3748">Performance Metrics</text>
  
  <!-- TPS Gauge -->
  <g transform="translate(175, 100)">
    <circle cx="0" cy="0" r="60" fill="none" stroke="#e2e8f0" stroke-width="10"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#48bb78" stroke-width="10" 
            stroke-dasharray="60 377" transform="rotate(-90)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2d3748">1K TPS</text>
    <text x="0" y="-40" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#718096">Transactions/sec</text>
  </g>
  
  <!-- Latency Gauge -->
  <g transform="translate(350, 100)">
    <circle cx="0" cy="0" r="60" fill="none" stroke="#e2e8f0" stroke-width="10"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#4299e1" stroke-width="10" 
            stroke-dasharray="188 377" transform="rotate(-90)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2d3748">50ms</text>
    <text x="0" y="-40" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#718096">Latency</text>
  </g>
  
  <!-- Memory Gauge -->
  <g transform="translate(525, 100)">
    <circle cx="0" cy="0" r="60" fill="none" stroke="#e2e8f0" stroke-width="10"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#ed8936" stroke-width="10" 
            stroke-dasharray="188 377" transform="rotate(-90)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2d3748">1GB</text>
    <text x="0" y="-40" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#718096">Memory</text>
  </g>
  
  <!-- Progress bars -->
  <g transform="translate(50, 200)">
    <!-- Optimization Progress -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#2d3748">Optimization Progress</text>
    <rect x="0" y="10" width="600" height="20" fill="#e2e8f0" rx="10"/>
    <rect x="0" y="10" width="420" height="20" fill="#9f7aea" rx="10"/>
    <text x="610" y="25" font-family="Arial, sans-serif" font-size="12" fill="#2d3748">70%</text>
    
    <!-- Stability -->
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="14" fill="#2d3748">System Stability</text>
    <rect x="0" y="70" width="600" height="20" fill="#e2e8f0" rx="10"/>
    <rect x="0" y="70" width="540" height="20" fill="#48bb78" rx="10"/>
    <text x="610" y="85" font-family="Arial, sans-serif" font-size="12" fill="#2d3748">90%</text>
  </g>
</svg>