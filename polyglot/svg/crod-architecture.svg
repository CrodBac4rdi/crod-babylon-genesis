<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#0a0a0a"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#00ff00" font-size="28" font-family="monospace">CROD Architecture</text>
  
  <!-- Core Blockchain -->
  <g id="blockchain-core">
    <rect x="300" y="200" width="200" height="80" fill="#1a1a1a" stroke="#00ff00" stroke-width="2"/>
    <text x="400" y="230" text-anchor="middle" fill="#00ff00" font-size="16" font-family="monospace">Blockchain Core</text>
    <text x="400" y="250" text-anchor="middle" fill="#888" font-size="12" font-family="monospace">Genesis • Mining • API</text>
    <text x="400" y="265" text-anchor="middle" fill="#0f0" font-size="10" font-family="monospace">✓ WORKING</text>
  </g>
  
  <!-- GUI -->
  <g id="gui">
    <rect x="100" y="100" width="150" height="60" fill="#1a1a1a" stroke="#00ff00" stroke-width="2"/>
    <text x="175" y="125" text-anchor="middle" fill="#00ff00" font-size="16" font-family="monospace">React GUI</text>
    <text x="175" y="145" text-anchor="middle" fill="#0f0" font-size="10" font-family="monospace">✓ WORKING</text>
  </g>
  
  <!-- LLaMA Training -->
  <g id="llama">
    <rect x="550" y="100" width="150" height="60" fill="#1a1a1a" stroke="#00ff00" stroke-width="2"/>
    <text x="625" y="125" text-anchor="middle" fill="#00ff00" font-size="16" font-family="monospace">LLaMA 7B</text>
    <text x="625" y="145" text-anchor="middle" fill="#0f0" font-size="10" font-family="monospace">✓ READY</text>
  </g>
  
  <!-- Polyglot Gateway -->
  <g id="gateway">
    <rect x="300" y="80" width="200" height="60" fill="#1a1a1a" stroke="#ff8800" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="400" y="105" text-anchor="middle" fill="#ff8800" font-size="16" font-family="monospace">Polyglot Gateway</text>
    <text x="400" y="125" text-anchor="middle" fill="#ff8800" font-size="10" font-family="monospace">⚡ IN PROGRESS</text>
  </g>
  
  <!-- Districts -->
  <g id="districts">
    <rect x="100" y="320" width="150" height="60" fill="#1a1a1a" stroke="#888" stroke-width="2" stroke-dasharray="3,3"/>
    <text x="175" y="345" text-anchor="middle" fill="#888" font-size="16" font-family="monospace">Pattern District</text>
    <text x="175" y="365" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">⏳ PLANNED</text>
  </g>
  
  <g id="districts2">
    <rect x="300" y="320" width="150" height="60" fill="#1a1a1a" stroke="#888" stroke-width="2" stroke-dasharray="3,3"/>
    <text x="375" y="345" text-anchor="middle" fill="#888" font-size="16" font-family="monospace">Memory Quarter</text>
    <text x="375" y="365" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">⏳ PLANNED</text>
  </g>
  
  <g id="districts3">
    <rect x="500" y="320" width="150" height="60" fill="#1a1a1a" stroke="#888" stroke-width="2" stroke-dasharray="3,3"/>
    <text x="575" y="345" text-anchor="middle" fill="#888" font-size="16" font-family="monospace">Intelligence Hub</text>
    <text x="575" y="365" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">⏳ PLANNED</text>
  </g>
  
  <!-- Connections -->
  <line x1="175" y1="160" x2="350" y2="200" stroke="#00ff00" stroke-width="1" opacity="0.5"/>
  <line x1="625" y1="160" x2="450" y2="200" stroke="#00ff00" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="140" x2="400" y2="200" stroke="#ff8800" stroke-width="2" opacity="0.5"/>
  
  <!-- Future connections -->
  <line x1="175" y1="320" x2="350" y2="280" stroke="#444" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="375" y1="320" x2="400" y2="280" stroke="#444" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="575" y1="320" x2="450" y2="280" stroke="#444" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Legend -->
  <g id="legend" transform="translate(50, 450)">
    <text x="0" y="0" fill="#fff" font-size="14" font-family="monospace">Status:</text>
    <rect x="0" y="10" width="20" height="10" fill="#0f0"/>
    <text x="25" y="18" fill="#0f0" font-size="12" font-family="monospace">Working</text>
    <rect x="100" y="10" width="20" height="10" fill="#ff8800"/>
    <text x="125" y="18" fill="#ff8800" font-size="12" font-family="monospace">In Progress</text>
    <rect x="220" y="10" width="20" height="10" fill="#888"/>
    <text x="245" y="18" fill="#888" font-size="12" font-family="monospace">Planned</text>
  </g>
  
  <!-- Entry Point -->
  <g id="entry">
    <rect x="300" y="450" width="200" height="50" fill="#00ff00" stroke="#fff" stroke-width="3"/>
    <text x="400" y="475" text-anchor="middle" fill="#000" font-size="18" font-weight="bold" font-family="monospace">./START.sh</text>
    <text x="400" y="490" text-anchor="middle" fill="#000" font-size="12" font-family="monospace">Single Entry Point</text>
  </g>
</svg>