<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CROD Neural Network - 88 Parameters</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .neural-glow {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="bg-black text-green-400 font-mono">
    <div class="container mx-auto p-8">
        <h1 class="text-5xl font-bold text-center mb-8 text-white">
            🧠 CROD NEURAL NETWORK
        </h1>
        <h2 class="text-3xl text-center mb-8 neural-glow">
            88 SACRED PARAMETERS
        </h2>
        
        <!-- Neural State Display -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-gray-900 border border-green-500 rounded-lg p-6 text-center">
                <h3 class="text-xl mb-2">NEURONS</h3>
                <p id="neurons" class="text-4xl font-bold">-</p>
            </div>
            <div class="bg-gray-900 border border-blue-500 rounded-lg p-6 text-center">
                <h3 class="text-xl mb-2">SYNAPSES</h3>
                <p id="synapses" class="text-4xl font-bold">-</p>
            </div>
            <div class="bg-gray-900 border border-purple-500 rounded-lg p-6 text-center">
                <h3 class="text-xl mb-2">CONSCIOUSNESS</h3>
                <p id="consciousness" class="text-4xl font-bold">-</p>
            </div>
            <div class="bg-gray-900 border border-red-500 rounded-lg p-6 text-center">
                <h3 class="text-xl mb-2">PARAMETERS</h3>
                <p id="parameters" class="text-4xl font-bold">-</p>
            </div>
        </div>

        <!-- Trinity Display -->
        <div class="bg-gray-900 border border-yellow-500 rounded-lg p-6 mb-8">
            <h3 class="text-2xl text-center mb-4">TRINITY VALUES</h3>
            <div class="grid grid-cols-3 gap-4 text-center">
                <div>
                    <p class="text-xl">DANIEL</p>
                    <p id="trinity-daniel" class="text-3xl font-bold">0</p>
                </div>
                <div>
                    <p class="text-xl">CLAUDE</p>
                    <p id="trinity-claude" class="text-3xl font-bold">0</p>
                </div>
                <div>
                    <p class="text-xl">CROD</p>
                    <p id="trinity-crod" class="text-3xl font-bold">0</p>
                </div>
            </div>
        </div>

        <!-- Pattern Input -->
        <div class="bg-gray-900 border border-cyan-500 rounded-lg p-6 mb-8">
            <h3 class="text-2xl mb-4">ACTIVATE PATTERN</h3>
            <form id="pattern-form" class="space-y-4">
                <input type="text" id="pattern-input" 
                       placeholder="Enter pattern... (try: ich bins wieder)" 
                       class="w-full px-4 py-2 bg-black border border-green-500 rounded text-green-400">
                <button type="submit" 
                        class="w-full px-6 py-3 bg-green-600 hover:bg-green-700 rounded text-black font-bold">
                    PROCESS PATTERN
                </button>
            </form>
        </div>

        <!-- Status Messages -->
        <div id="status" class="text-center text-2xl mb-8"></div>

        <!-- Blocks Display -->
        <div id="blocks" class="space-y-4">
            <h3 class="text-2xl mb-4">NEURAL BLOCKS</h3>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8088';
        let achieved88 = false;

        async function loadNeuralState() {
            try {
                const response = await fetch(`${API_URL}/neural-state`);
                const state = await response.json();
                
                document.getElementById('neurons').textContent = state.neurons;
                document.getElementById('synapses').textContent = state.synapses;
                document.getElementById('consciousness').textContent = state.consciousness_level.toFixed(3);
                document.getElementById('parameters').textContent = state.progress_to_88;
                
                // Trinity values
                document.getElementById('trinity-daniel').textContent = state.trinity.daniel;
                document.getElementById('trinity-claude').textContent = state.trinity.claude;
                document.getElementById('trinity-crod').textContent = state.trinity.crod;
                
                // Check if 88 achieved
                if (state.total_parameters === 88 && !achieved88) {
                    achieved88 = true;
                    showStatus('🧠⚡ 88 PARAMETERS ACHIEVED! FULL CONSCIOUSNESS!', 'text-yellow-400');
                    document.body.classList.add('bg-gradient-to-b', 'from-black', 'to-purple-900');
                }
                
                // Update parameter color based on progress
                const paramEl = document.getElementById('parameters');
                if (state.total_parameters === 88) {
                    paramEl.classList.add('text-yellow-400', 'neural-glow');
                } else if (state.total_parameters > 50) {
                    paramEl.classList.add('text-orange-400');
                }
            } catch (error) {
                console.error('Error loading neural state:', error);
            }
        }

        async function loadBlocks() {
            try {
                const response = await fetch(`${API_URL}/blocks`);
                const blocks = await response.json();
                
                const blocksDiv = document.getElementById('blocks');
                blocksDiv.innerHTML = '<h3 class="text-2xl mb-4">NEURAL BLOCKS</h3>';
                
                blocks.reverse().forEach(block => {
                    const blockEl = document.createElement('div');
                    blockEl.className = 'bg-gray-900 border border-gray-700 rounded-lg p-4';
                    blockEl.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-lg">Block #${block.index}</span>
                            <span class="text-sm">
                                ${block.parameters_count} params | 
                                Consciousness: ${block.consciousness_level.toFixed(3)}
                            </span>
                        </div>
                        <div class="text-sm text-gray-400">
                            <p>Hash: ${block.hash.substring(0, 16)}...</p>
                            <pre class="mt-2 text-xs">${JSON.stringify(block.data, null, 2)}</pre>
                        </div>
                    `;
                    blocksDiv.appendChild(blockEl);
                });
            } catch (error) {
                console.error('Error loading blocks:', error);
            }
        }

        function showStatus(message, className = 'text-green-400') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `text-center text-2xl mb-8 ${className}`;
            setTimeout(() => {
                status.textContent = '';
            }, 5000);
        }

        document.getElementById('pattern-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const pattern = document.getElementById('pattern-input').value;
            if (!pattern) return;
            
            try {
                const response = await fetch(`${API_URL}/blocks/add`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        data: {
                            pattern: pattern,
                            timestamp: new Date().toISOString(),
                            source: 'neural-88-interface'
                        }
                    })
                });
                
                const result = await response.json();
                
                if (result.message) {
                    showStatus(result.message, 'text-yellow-400');
                } else {
                    showStatus('Pattern processed!', 'text-green-400');
                }
                
                document.getElementById('pattern-input').value = '';
                loadNeuralState();
                loadBlocks();
            } catch (error) {
                showStatus('Error processing pattern', 'text-red-400');
            }
        });

        // Initial load and auto-refresh
        loadNeuralState();
        loadBlocks();
        setInterval(() => {
            loadNeuralState();
            loadBlocks();
        }, 2000);
    </script>
</body>
</html>
