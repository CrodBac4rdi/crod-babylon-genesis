<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGPU Compatibility Check</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">
    <div class="container mx-auto p-8 max-w-4xl">
        <h1 class="text-4xl font-bold text-center mb-8">🔍 WebGPU Compatibility Check</h1>
        
        <div id="browser-info" class="bg-gray-800 rounded-lg p-6 mb-6">
            <h2 class="text-2xl mb-4">Browser Information</h2>
            <div id="browser-details" class="space-y-2 font-mono text-sm"></div>
        </div>

        <div id="webgpu-status" class="bg-gray-800 rounded-lg p-6 mb-6">
            <h2 class="text-2xl mb-4">WebGPU Status</h2>
            <div id="status-details" class="space-y-4"></div>
        </div>

        <div id="instructions" class="bg-gray-800 rounded-lg p-6">
            <h2 class="text-2xl mb-4">Installation Instructions</h2>
            <div id="install-steps" class="space-y-4"></div>
        </div>
    </div>

    <script>
        // Browser detection
        function getBrowserInfo() {
            const ua = navigator.userAgent;
            let browserName = 'Unknown';
            let browserVersion = '';
            
            if (ua.indexOf('Chrome') > -1 && ua.indexOf('Edg') === -1) {
                browserName = 'Chrome';
                browserVersion = ua.match(/Chrome\/(\d+)/)?.[1] || '';
            } else if (ua.indexOf('Edg') > -1) {
                browserName = 'Edge';
                browserVersion = ua.match(/Edg\/(\d+)/)?.[1] || '';
            } else if (ua.indexOf('Firefox') > -1) {
                browserName = 'Firefox';
                browserVersion = ua.match(/Firefox\/(\d+)/)?.[1] || '';
            } else if (ua.indexOf('Safari') > -1 && ua.indexOf('Chrome') === -1) {
                browserName = 'Safari';
                browserVersion = ua.match(/Version\/(\d+)/)?.[1] || '';
            }
            
            return {
                name: browserName,
                version: browserVersion,
                userAgent: ua,
                platform: navigator.platform
            };
        }

        // WebGPU check
        async function checkWebGPU() {
            const results = {
                supported: false,
                adapter: null,
                device: null,
                error: null
            };

            try {
                if (!navigator.gpu) {
                    throw new Error('WebGPU not available in navigator');
                }
                
                results.supported = true;
                
                const adapter = await navigator.gpu.requestAdapter();
                if (!adapter) {
                    throw new Error('No GPU adapter found');
                }
                
                results.adapter = {
                    vendor: 'Unknown',
                    architecture: 'Unknown',
                    device: 'Unknown',
                    description: 'Unknown'
                };
                
                if (adapter.requestAdapterInfo) {
                    const info = await adapter.requestAdapterInfo();
                    results.adapter = {
                        vendor: info.vendor || 'Unknown',
                        architecture: info.architecture || 'Unknown',
                        device: info.device || 'Unknown',
                        description: info.description || 'WebGPU Adapter'
                    };
                }
                
                const device = await adapter.requestDevice();
                results.device = device ? true : false;
                
            } catch (error) {
                results.error = error.message;
            }
            
            return results;
        }

        // Display results
        async function displayResults() {
            const browserInfo = getBrowserInfo();
            const webgpuResults = await checkWebGPU();
            
            // Browser details
            const browserDetails = document.getElementById('browser-details');
            browserDetails.innerHTML = `
                <p>Browser: <span class="text-green-400">${browserInfo.name} ${browserInfo.version}</span></p>
                <p>Platform: <span class="text-blue-400">${browserInfo.platform}</span></p>
                <p class="text-xs text-gray-400 mt-2">User Agent: ${browserInfo.userAgent}</p>
            `;
            
            // WebGPU status
            const statusDetails = document.getElementById('status-details');
            
            if (webgpuResults.supported && webgpuResults.device) {
                statusDetails.innerHTML = `
                    <div class="bg-green-900 border border-green-500 rounded p-4">
                        <p class="text-2xl font-bold text-green-400">✅ WebGPU is fully supported!</p>
                    </div>
                    <div class="bg-gray-700 rounded p-4">
                        <p class="font-semibold mb-2">GPU Information:</p>
                        <p>Vendor: ${webgpuResults.adapter.vendor}</p>
                        <p>Device: ${webgpuResults.adapter.device}</p>
                        <p>Architecture: ${webgpuResults.adapter.architecture}</p>
                        <p>Description: ${webgpuResults.adapter.description}</p>
                    </div>
                `;
            } else {
                let status = '❌ WebGPU is NOT supported';
                let details = '';
                
                if (webgpuResults.error) {
                    details = `Error: ${webgpuResults.error}`;
                } else if (webgpuResults.supported && !webgpuResults.device) {
                    status = '⚠️ WebGPU partially supported';
                    details = 'GPU adapter found but device creation failed';
                }
                
                statusDetails.innerHTML = `
                    <div class="bg-red-900 border border-red-500 rounded p-4">
                        <p class="text-2xl font-bold text-red-400">${status}</p>
                        ${details ? `<p class="mt-2 text-sm">${details}</p>` : ''}
                    </div>
                `;
            }
            
            // Installation instructions
            const installSteps = document.getElementById('install-steps');
            
            if (browserInfo.name === 'Firefox') {
                installSteps.innerHTML = `
                    <div class="bg-orange-900 border border-orange-500 rounded p-4">
                        <p class="font-bold text-orange-400">Firefox does not support WebGPU yet!</p>
                        <p class="mt-2">WebGPU is still experimental in Firefox and not enabled by default.</p>
                    </div>
                    <div class="mt-4">
                        <p class="font-semibold mb-2">To use WebGPU, install Chrome or Edge:</p>
                        <div class="bg-gray-700 rounded p-4 font-mono text-sm">
                            <p># Install Google Chrome:</p>
                            <p>wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -</p>
                            <p>sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'</p>
                            <p>sudo apt update</p>
                            <p>sudo apt install google-chrome-stable</p>
                        </div>
                    </div>
                `;
            } else if (!webgpuResults.supported) {
                installSteps.innerHTML = `
                    <div class="bg-yellow-900 border border-yellow-500 rounded p-4">
                        <p class="font-bold text-yellow-400">Your browser needs to be updated or configured!</p>
                    </div>
                    <div class="mt-4 space-y-4">
                        <div>
                            <p class="font-semibold mb-2">For Chrome/Edge (version 113+):</p>
                            <ol class="list-decimal list-inside space-y-2 ml-4">
                                <li>Make sure you have the latest version</li>
                                <li>Go to chrome://flags or edge://flags</li>
                                <li>Enable "Unsafe WebGPU" (#enable-unsafe-webgpu)</li>
                                <li>Restart the browser</li>
                            </ol>
                        </div>
                        <div>
                            <p class="font-semibold mb-2">Check GPU acceleration:</p>
                            <ol class="list-decimal list-inside space-y-2 ml-4">
                                <li>Go to chrome://gpu</li>
                                <li>Ensure "Hardware acceleration" is enabled</li>
                                <li>Look for "WebGPU: Hardware accelerated"</li>
                            </ol>
                        </div>
                    </div>
                `;
            } else {
                installSteps.innerHTML = `
                    <div class="bg-green-900 border border-green-500 rounded p-4">
                        <p class="font-bold text-green-400">Your browser is ready for WebGPU!</p>
                    </div>
                    <div class="mt-4">
                        <p class="font-semibold mb-2">You can now:</p>
                        <ul class="list-disc list-inside space-y-2 ml-4">
                            <li>Use the CROD WebGPU Mining interface</li>
                            <li>Run GPU-accelerated blockchain operations</li>
                            <li>Experience 10-100x faster mining performance</li>
                        </ul>
                        <div class="mt-4">
                            <a href="webgpu_mining.html" class="inline-block px-6 py-3 bg-purple-600 hover:bg-purple-700 rounded-lg font-semibold">
                                🚀 Open WebGPU Mining
                            </a>
                        </div>
                    </div>
                `;
            }
        }

        // Run check on load
        displayResults();
    </script>
</body>
</html>
