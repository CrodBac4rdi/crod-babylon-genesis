<!DOCTYPE html>
<html>
<head>
    <title>CROD Test Page</title>
    <style>
        body {
            background: #000;
            color: #0f0;
            font-family: monospace;
            padding: 20px;
        }
        button {
            background: #0f0;
            color: #000;
            padding: 10px 20px;
            margin: 10px;
            border: none;
            cursor: pointer;
            font-family: monospace;
            font-size: 16px;
        }
        button:hover {
            background: #0a0;
        }
        #output {
            background: #111;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #0f0;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>🎮 CROD Blockchain Test</h1>
    <p>This page tests if the blockchain API is working.</p>
    
    <button onclick="testAPI()">Test API Connection</button>
    <button onclick="createGenesis()">Create Genesis Block</button>
    <button onclick="mineBlock()">Mine a Block</button>
    <button onclick="showBlocks()">Show All Blocks</button>
    
    <div id="output">Click a button to test...</div>
    
    <script>
        const API_URL = window.location.origin.replace('8080', '4000');
        const output = document.getElementById('output');
        
        function log(msg) {
            output.innerHTML += msg + '\n';
        }
        
        function clear() {
            output.innerHTML = '';
        }
        
        async function testAPI() {
            clear();
            log('Testing API at: ' + API_URL);
            try {
                const res = await fetch(API_URL + '/status');
                const data = await res.json();
                log('✅ API is working!');
                log(JSON.stringify(data, null, 2));
            } catch (e) {
                log('❌ Error: ' + e.message);
                log('Make sure to run ./start-simple.sh first!');
            }
        }
        
        async function createGenesis() {
            clear();
            log('Creating Genesis Block...');
            try {
                const res = await fetch(API_URL + '/genesis', {method: 'POST'});
                const data = await res.json();
                log('✅ Genesis Created!');
                log('🔐 SAVE YOUR PASSWORD:');
                log(JSON.stringify(data.credentials, null, 2));
            } catch (e) {
                log('❌ Error: ' + e.message);
            }
        }
        
        async function mineBlock() {
            clear();
            log('Mining a block...');
            try {
                const res = await fetch(API_URL + '/mine', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({data: {message: 'Test block ' + Date.now()}})
                });
                const data = await res.json();
                log('✅ Block Mined!');
                log(JSON.stringify(data, null, 2));
            } catch (e) {
                log('❌ Error: ' + e.message);
            }
        }
        
        async function showBlocks() {
            clear();
            log('Fetching blocks...');
            try {
                const res = await fetch(API_URL + '/blocks');
                const data = await res.json();
                log('📦 Blockchain Blocks:');
                log(JSON.stringify(data, null, 2));
            } catch (e) {
                log('❌ Error: ' + e.message);
            }
        }
    </script>
</body>
</html>
