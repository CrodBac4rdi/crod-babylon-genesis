<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CROD WebGPU Mining</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">
    <div class="container mx-auto p-8">
        <h1 class="text-4xl font-bold text-center mb-8">⚡ CROD WebGPU Mining</h1>
        
        <div id="status" class="bg-gray-800 rounded-lg p-6 mb-6">
            <h2 class="text-2xl mb-4">GPU Status</h2>
            <p id="gpu-info">Checking WebGPU support...</p>
        </div>

        <div class="bg-gray-800 rounded-lg p-6 mb-6">
            <h2 class="text-2xl mb-4">Mining Performance</h2>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <p class="text-gray-400">Hash Rate</p>
                    <p id="hashrate" class="text-3xl font-bold text-green-400">0 H/s</p>
                </div>
                <div>
                    <p class="text-gray-400">Blocks Mined</p>
                    <p id="blocks-mined" class="text-3xl font-bold text-blue-400">0</p>
                </div>
            </div>
        </div>

        <div class="bg-gray-800 rounded-lg p-6">
            <h2 class="text-2xl mb-4">Mining Control</h2>
            <div class="space-y-4">
                <div>
                    <label>Consciousness Level: <span id="consciousness-value">0.5</span></label>
                    <input type="range" id="consciousness" min="0" max="1" step="0.01" value="0.5" class="w-full">
                </div>
                <div>
                    <label>Mining Threads: <span id="threads-value">256</span></label>
                    <input type="range" id="threads" min="64" max="1024" step="64" value="256" class="w-full">
                </div>
                <button id="start-mining" class="px-6 py-2 bg-purple-600 hover:bg-purple-700 rounded-lg">
                    Start GPU Mining
                </button>
                <button id="stop-mining" class="px-6 py-2 bg-red-600 hover:bg-red-700 rounded-lg" disabled>
                    Stop Mining
                </button>
            </div>
        </div>

        <div class="mt-6 bg-gray-800 rounded-lg p-6">
            <h2 class="text-2xl mb-4">Mining Log</h2>
            <div id="log" class="font-mono text-sm h-40 overflow-y-scroll bg-gray-900 p-4 rounded">
                <p>Ready to start WebGPU mining...</p>
            </div>
        </div>
    </div>

    <script>
        // WebGPU Mining Implementation
        class CRODWebGPUMiner {
            constructor() {
                this.device = null;
                this.mining = false;
                this.hashRate = 0;
                this.blocksMined = 0;
                this.shaderModule = null;
            }

            async initialize() {
                if (!navigator.gpu) {
                    throw new Error('WebGPU not supported');
                }

                const adapter = await navigator.gpu.requestAdapter();
                if (!adapter) {
                    throw new Error('No GPU adapter found');
                }

                this.device = await adapter.requestDevice();
                
                // Get GPU info
                const info = adapter.requestAdapterInfo ? await adapter.requestAdapterInfo() : {};
                return {
                    vendor: info.vendor || 'Unknown',
                    architecture: info.architecture || 'Unknown',
                    device: info.device || 'Unknown',
                    description: info.description || 'WebGPU Device'
                };
            }

            async createMiningShader(difficulty, consciousness) {
                const shaderCode = `
                    struct MiningData {
                        target_difficulty: u32,
                        consciousness_level: f32,
                        nonce_start: u32,
                        block_data_hash: array<u32, 8>,
                    }

                    struct MiningResult {
                        found: u32,
                        nonce: u32,
                        hash: array<u32, 8>,
                        consciousness_boost: f32,
                    }

                    @group(0) @binding(0) var<uniform> mining_data: MiningData;
                    @group(0) @binding(1) var<storage, read_write> result: MiningResult;

                    // Simple SHA256-like hash function for demo
                    fn hash_nonce(nonce: u32) -> array<u32, 8> {
                        var hash: array<u32, 8>;
                        for (var i = 0u; i < 8u; i++) {
                            hash[i] = mining_data.block_data_hash[i] ^ (nonce * (i + 1u));
                            hash[i] = hash[i] * 0x9e3779b9u + mining_data.consciousness_level;
                        }
                        return hash;
                    }

                    fn check_difficulty(hash: array<u32, 8>) -> bool {
                        let leading_zeros = mining_data.target_difficulty;
                        let mask = (1u << (32u - leading_zeros)) - 1u;
                        return (hash[0] & ~mask) == 0u;
                    }

                    @compute @workgroup_size(256)
                    fn mine(@builtin(global_invocation_id) global_id: vec3<u32>) {
                        let nonce = mining_data.nonce_start + global_id.x;
                        let hash = hash_nonce(nonce);
                        
                        if (check_difficulty(hash) && result.found == 0u) {
                            result.found = 1u;
                            result.nonce = nonce;
                            result.hash = hash;
                            result.consciousness_boost = mining_data.consciousness_level * 1.5;
                        }
                    }
                `;

                this.shaderModule = this.device.createShaderModule({
                    label: 'CROD Mining Shader',
                    code: shaderCode
                });
            }

            async mine(blockData, difficulty = 4, consciousness = 0.5, threads = 256) {
                if (!this.device) {
                    throw new Error('WebGPU not initialized');
                }

                await this.createMiningShader(difficulty, consciousness);

                // Create buffers
                const miningDataBuffer = this.device.createBuffer({
                    size: 48, // 4 + 4 + 4 + 32 bytes
                    usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST
                });

                const resultBuffer = this.device.createBuffer({
                    size: 48, // 4 + 4 + 32 + 4 bytes
                    usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC
                });

                // Create compute pipeline
                const pipeline = this.device.createComputePipeline({
                    layout: 'auto',
                    compute: {
                        module: this.shaderModule,
                        entryPoint: 'mine'
                    }
                });

                // Create bind group
                const bindGroup = this.device.createBindGroup({
                    layout: pipeline.getBindGroupLayout(0),
                    entries: [
                        { binding: 0, resource: { buffer: miningDataBuffer } },
                        { binding: 1, resource: { buffer: resultBuffer } }
                    ]
                });

                let nonce = 0;
                const startTime = Date.now();

                while (this.mining) {
                    // Update mining data
                    const miningData = new ArrayBuffer(48);
                    const dataView = new DataView(miningData);
                    dataView.setUint32(0, difficulty, true);
                    dataView.setFloat32(4, consciousness, true);
                    dataView.setUint32(8, nonce, true);
                    
                    // Simple block data hash (would be real block data in production)
                    for (let i = 0; i < 8; i++) {
                        dataView.setUint32(12 + i * 4, Math.random() * 0xFFFFFFFF | 0, true);
                    }

                    this.device.queue.writeBuffer(miningDataBuffer, 0, miningData);

                    // Clear result buffer
                    this.device.queue.writeBuffer(resultBuffer, 0, new ArrayBuffer(48));

                    // Run compute shader
                    const commandEncoder = this.device.createCommandEncoder();
                    const computePass = commandEncoder.beginComputePass();
                    computePass.setPipeline(pipeline);
                    computePass.setBindGroup(0, bindGroup);
                    computePass.dispatchWorkgroups(Math.ceil(threads / 256));
                    computePass.end();

                    // Read results
                    const readBuffer = this.device.createBuffer({
                        size: 48,
                        usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ
                    });

                    commandEncoder.copyBufferToBuffer(resultBuffer, 0, readBuffer, 0, 48);
                    this.device.queue.submit([commandEncoder.finish()]);

                    await readBuffer.mapAsync(GPUMapMode.READ);
                    const result = new DataView(readBuffer.getMappedRange());
                    
                    if (result.getUint32(0, true) === 1) {
                        const foundNonce = result.getUint32(4, true);
                        this.blocksMined++;
                        readBuffer.unmap();
                        return {
                            found: true,
                            nonce: foundNonce,
                            consciousness_boost: result.getFloat32(44, true)
                        };
                    }

                    readBuffer.unmap();
                    nonce += threads;

                    // Update hash rate
                    const elapsed = (Date.now() - startTime) / 1000;
                    this.hashRate = nonce / elapsed;

                    // Small delay to not freeze browser
                    await new Promise(resolve => setTimeout(resolve, 10));
                }

                return { found: false };
            }

            startMining() {
                this.mining = true;
            }

            stopMining() {
                this.mining = false;
            }
        }

        // UI Integration
        const miner = new CRODWebGPUMiner();
        const log = document.getElementById('log');

        function addLog(message) {
            const p = document.createElement('p');
            p.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            log.appendChild(p);
            log.scrollTop = log.scrollHeight;
        }

        // Initialize WebGPU
        (async () => {
            try {
                const gpuInfo = await miner.initialize();
                document.getElementById('gpu-info').textContent = 
                    `✅ WebGPU Ready - ${gpuInfo.description}`;
                addLog(`GPU initialized: ${gpuInfo.vendor} ${gpuInfo.architecture}`);
            } catch (error) {
                document.getElementById('gpu-info').textContent = 
                    `❌ WebGPU Error: ${error.message}`;
                document.getElementById('start-mining').disabled = true;
                addLog(`Failed to initialize WebGPU: ${error.message}`);
            }
        })();

        // UI Controls
        document.getElementById('consciousness').addEventListener('input', (e) => {
            document.getElementById('consciousness-value').textContent = e.target.value;
        });

        document.getElementById('threads').addEventListener('input', (e) => {
            document.getElementById('threads-value').textContent = e.target.value;
        });

        document.getElementById('start-mining').addEventListener('click', async () => {
            document.getElementById('start-mining').disabled = true;
            document.getElementById('stop-mining').disabled = false;
            
            const consciousness = parseFloat(document.getElementById('consciousness').value);
            const threads = parseInt(document.getElementById('threads').value);
            
            miner.startMining();
            addLog(`Started GPU mining with consciousness ${consciousness} and ${threads} threads`);
            
            // Update hash rate display
            const updateInterval = setInterval(() => {
                if (!miner.mining) {
                    clearInterval(updateInterval);
                    return;
                }
                document.getElementById('hashrate').textContent = 
                    `${(miner.hashRate / 1000000).toFixed(2)} MH/s`;
                document.getElementById('blocks-mined').textContent = miner.blocksMined;
            }, 1000);
            
            // Mine blocks
            while (miner.mining) {
                const blockData = { 
                    timestamp: Date.now(), 
                    data: 'CROD WebGPU Block',
                    consciousness: consciousness 
                };
                
                const result = await miner.mine(blockData, 4, consciousness, threads);
                
                if (result.found) {
                    addLog(`⛏️ Block mined! Nonce: ${result.nonce}, Consciousness boost: ${result.consciousness_boost.toFixed(2)}`);
                    
                    // Send to blockchain API
                    try {
                        const response = await fetch('http://localhost:8001/blocks/add', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                data: {
                                    ...blockData,
                                    gpu_mined: true,
                                    nonce: result.nonce
                                },
                                consciousness_level: consciousness * result.consciousness_boost
                            })
                        });
                        
                        if (response.ok) {
                            addLog('✅ Block submitted to blockchain');
                        }
                    } catch (error) {
                        addLog(`❌ Failed to submit block: ${error.message}`);
                    }
                }
            }
        });

        document.getElementById('stop-mining').addEventListener('click', () => {
            miner.stopMining();
            document.getElementById('start-mining').disabled = false;
            document.getElementById('stop-mining').disabled = true;
            addLog('Mining stopped');
        });
    </script>
</body>
</html>
