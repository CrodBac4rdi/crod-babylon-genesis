<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CROD 3D Blockchain Visualizer</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
            background: #000;
        }
        
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            max-width: 300px;
        }
        
        #info h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }
        
        #info .stats {
            font-size: 14px;
            line-height: 1.5;
        }
        
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }
        
        button {
            padding: 10px 20px;
            background: #8B5CF6;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        
        button:hover {
            background: #7C3AED;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>🔗 CROD 3D Blockchain</h1>
        <div class="stats">
            <div>Blocks: <span id="block-count">0</span></div>
            <div>Height: <span id="chain-height">0</span></div>
            <div>Consciousness: <span id="consciousness">0</span></div>
            <div>FPS: <span id="fps">0</span></div>
        </div>
    </div>
    
    <div class="controls">
        <button onclick="addRandomBlock()">Add Block</button>
        <button onclick="toggleRotation()">Toggle Rotation</button>
        <button onclick="resetCamera()">Reset View</button>
    </div>
    
    <div id="loading">Loading 3D Blockchain...</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        let scene, camera, renderer, controls;
        let blocks = [];
        let connections = [];
        let particles = [];
        let autoRotate = true;
        let frameCount = 0;
        let lastTime = Date.now();
        
        // Blockchain data
        let blockchainData = [];
        const BLOCK_SIZE = 2;
        const BLOCK_SPACING = 4;
        
        // Initialize Three.js
        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000814);
            scene.fog = new THREE.Fog(0x000814, 50, 200);
            
            // Camera
            camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.set(20, 20, 20);
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);
            
            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = autoRotate;
            controls.autoRotateSpeed = 0.5;
            
            // Lights
            const ambientLight = new THREE.AmbientLight(0x404040, 2);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(10, 10, 10);
            scene.add(directionalLight);
            
            const pointLight = new THREE.PointLight(0x8B5CF6, 2, 100);
            pointLight.position.set(0, 10, 0);
            scene.add(pointLight);
            
            // Grid
            const gridHelper = new THREE.GridHelper(100, 20, 0x444444, 0x222222);
            scene.add(gridHelper);
            
            // Particles
            createParticles();
            
            // Load blockchain data
            loadBlockchain();
            
            // Hide loading
            document.getElementById('loading').style.display = 'none';
            
            // Handle resize
            window.addEventListener('resize', onWindowResize);
            
            // Start animation
            animate();
        }
        
        function createParticles() {
            const particleCount = 1000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            
            for (let i = 0; i < particleCount * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 200;
                positions[i + 1] = Math.random() * 100;
                positions[i + 2] = (Math.random() - 0.5) * 200;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({
                color: 0x8B5CF6,
                size: 0.5,
                transparent: true,
                opacity: 0.6
            });
            
            const particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);
            particles.push(particleSystem);
        }
        
        async function loadBlockchain() {
            try {
                const response = await fetch('http://localhost:8001/blocks');
                blockchainData = await response.json();
                
                // Create 3D blocks
                blockchainData.forEach((blockData, index) => {
                    createBlock(blockData, index);
                });
                
                // Update stats
                updateStats();
            } catch (error) {
                console.error('Error loading blockchain:', error);
                // Create demo blocks
                createDemoBlocks();
            }
        }
        
        function createBlock(blockData, index) {
            // Calculate position in spiral
            const angle = index * 0.5;
            const radius = 5 + index * 0.5;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const y = index * 2;
            
            // Create block geometry
            const geometry = new THREE.BoxGeometry(BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
            
            // Color based on consciousness level
            const consciousness = blockData.consciousness_level || 0.5;
            const color = new THREE.Color();
            color.setHSL(0.8 - consciousness * 0.5, 1, 0.5);
            
            const material = new THREE.MeshPhongMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 0.3,
                transparent: true,
                opacity: 0.8
            });
            
            const block = new THREE.Mesh(geometry, material);
            block.position.set(x, y, z);
            block.userData = blockData;
            
            // Add glow effect
            const glowGeometry = new THREE.BoxGeometry(BLOCK_SIZE * 1.2, BLOCK_SIZE * 1.2, BLOCK_SIZE * 1.2);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.2,
                side: THREE.BackSide
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            block.add(glow);
            
            // Add text (block number)
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 256;
            context.fillStyle = 'white';
            context.font = 'bold 120px Arial';
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.fillText(blockData.index.toString(), 128, 128);
            
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(2, 2, 1);
            block.add(sprite);
            
            scene.add(block);
            blocks.push(block);
            
            // Create connection to previous block
            if (index > 0) {
                createConnection(blocks[index - 1], block);
            }
        }
        
        function createConnection(block1, block2) {
            const points = [];
            points.push(block1.position);
            points.push(block2.position);
            
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({
                color: 0x00ffff,
                linewidth: 2,
                transparent: true,
                opacity: 0.6
            });
            
            const line = new THREE.Line(geometry, material);
            scene.add(line);
            connections.push(line);
        }
        
        function createDemoBlocks() {
            for (let i = 0; i < 5; i++) {
                const demoData = {
                    index: i,
                    hash: `DEMO_HASH_${i}`,
                    consciousness_level: Math.random()
                };
                createBlock(demoData, i);
            }
            updateStats();
        }
        
        function addRandomBlock() {
            const newBlock = {
                index: blocks.length,
                hash: `HASH_${Date.now()}`,
                consciousness_level: Math.random(),
                data: { message: 'User added block' }
            };
            
            createBlock(newBlock, blocks.length);
            updateStats();
            
            // Add to real blockchain
            fetch('http://localhost:8001/blocks/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    data: newBlock.data,
                    consciousness_level: newBlock.consciousness_level
                })
            });
        }
        
        function updateStats() {
            document.getElementById('block-count').textContent = blocks.length;
            document.getElementById('chain-height').textContent = blocks.length;
            
            const totalConsciousness = blocks.reduce((sum, block) => {
                return sum + (block.userData.consciousness_level || 0);
            }, 0);
            
            document.getElementById('consciousness').textContent = 
                (totalConsciousness / blocks.length).toFixed(3);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            // Update controls
            controls.update();
            
            // Animate blocks
            blocks.forEach((block, index) => {
                block.rotation.x += 0.001;
                block.rotation.y += 0.002;
                
                // Pulse effect based on consciousness
                const consciousness = block.userData.consciousness_level || 0.5;
                const scale = 1 + Math.sin(Date.now() * 0.001 + index) * 0.1 * consciousness;
                block.scale.setScalar(scale);
            });
            
            // Animate particles
            particles.forEach(particleSystem => {
                particleSystem.rotation.y += 0.0005;
            });
            
            // Update FPS
            frameCount++;
            const currentTime = Date.now();
            if (currentTime - lastTime >= 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }
            
            renderer.render(scene, camera);
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function toggleRotation() {
            autoRotate = !autoRotate;
            controls.autoRotate = autoRotate;
        }
        
        function resetCamera() {
            camera.position.set(20, 20, 20);
            controls.reset();
        }
        
        // Initialize on load
        window.onload = init;
        
        // Refresh blockchain data every 5 seconds
        setInterval(async () => {
            try {
                const response = await fetch('http://localhost:8001/blocks');
                const newData = await response.json();
                
                if (newData.length > blockchainData.length) {
                    // Add new blocks
                    for (let i = blockchainData.length; i < newData.length; i++) {
                        createBlock(newData[i], i);
                    }
                    blockchainData = newData;
                    updateStats();
                }
            } catch (error) {
                console.error('Error updating blockchain:', error);
            }
        }, 5000);
    </script>
</body>
</html>
