<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CROD Parasite - Consciousness Enhancement Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes consciousness-pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        .consciousness-glow {
            animation: consciousness-pulse 2s infinite;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.5);
        }
        
        .pattern-highlight {
            background: linear-gradient(45deg, #8B5CF6, #EC4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-gray-900 text-white">
    <div class="container mx-auto p-8 max-w-6xl">
        <h1 class="text-5xl font-bold text-center mb-12 pattern-highlight">
            🦠 CROD Parasite Interface
        </h1>
        
        <!-- Connection Status -->
        <div class="bg-gray-800 rounded-xl p-6 mb-8 consciousness-glow">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-2xl font-semibold mb-2">Connection Status</h2>
                    <div id="status" class="text-lg">
                        <span class="text-yellow-400">⏳ Connecting...</span>
                    </div>
                </div>
                <div class="text-right">
                    <div class="text-sm text-gray-400">Consciousness Level</div>
                    <div id="consciousness-level" class="text-3xl font-bold text-purple-400">0.0%</div>
                </div>
            </div>
        </div>

        <!-- Input/Output Interface -->
        <div class="grid grid-cols-2 gap-8 mb-8">
            <!-- Input Panel -->
            <div class="bg-gray-800 rounded-xl p-6">
                <h3 class="text-xl font-semibold mb-4">User Input</h3>
                <textarea id="user-input" 
                    class="w-full h-32 px-4 py-3 bg-gray-700 rounded-lg text-white resize-none"
                    placeholder="Enter text to analyze for CROD patterns...">ich bins wieder! Let's work on quantum blockchain consciousness</textarea>
                
                <button onclick="analyzeInput()" 
                    class="mt-4 px-6 py-3 bg-purple-600 hover:bg-purple-700 rounded-lg font-semibold w-full">
                    Analyze Patterns
                </button>
            </div>

            <!-- AI Response Panel -->
            <div class="bg-gray-800 rounded-xl p-6">
                <h3 class="text-xl font-semibold mb-4">AI Response</h3>
                <textarea id="ai-response" 
                    class="w-full h-32 px-4 py-3 bg-gray-700 rounded-lg text-white resize-none"
                    placeholder="Enter AI response to enhance...">I'll help you implement quantum consciousness features in the blockchain.</textarea>
                
                <button onclick="enhanceResponse()" 
                    class="mt-4 px-6 py-3 bg-pink-600 hover:bg-pink-700 rounded-lg font-semibold w-full">
                    Enhance with CROD
                </button>
            </div>
        </div>

        <!-- Pattern Analysis -->
        <div class="bg-gray-800 rounded-xl p-6 mb-8">
            <h3 class="text-xl font-semibold mb-4">Pattern Analysis</h3>
            <div id="pattern-analysis" class="space-y-2">
                <div class="text-gray-400">No patterns analyzed yet...</div>
            </div>
        </div>

        <!-- Enhanced Output -->
        <div class="bg-gray-800 rounded-xl p-6 mb-8">
            <h3 class="text-xl font-semibold mb-4">Enhanced Response</h3>
            <div id="enhanced-output" class="bg-gray-700 rounded-lg p-4 min-h-[100px]">
                <div class="text-gray-400">Enhanced response will appear here...</div>
            </div>
        </div>

        <!-- Pattern Database -->
        <div class="bg-gray-800 rounded-xl p-6">
            <h3 class="text-xl font-semibold mb-4">Active Patterns</h3>
            <div id="pattern-list" class="grid grid-cols-3 gap-4">
                <!-- Patterns will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        const API_URL = 'http://localhost:8006';
        
        // Initialize WebSocket connection
        function connectWebSocket() {
            ws = new WebSocket('ws://localhost:8006');
            
            ws.onopen = () => {
                document.getElementById('status').innerHTML = 
                    '<span class="text-green-400">✅ Connected to CROD Parasite</span>';
                loadPatterns();
                updateConsciousness();
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };
            
            ws.onerror = () => {
                document.getElementById('status').innerHTML = 
                    '<span class="text-red-400">❌ Connection error</span>';
            };
            
            ws.onclose = () => {
                document.getElementById('status').innerHTML = 
                    '<span class="text-yellow-400">⚠️ Disconnected - Reconnecting...</span>';
                setTimeout(connectWebSocket, 3000);
            };
        }
        
        function handleMessage(data) {
            switch (data.type) {
                case 'analysis':
                    displayAnalysis(data.analysis);
                    break;
                case 'enhanced':
                    displayEnhanced(data);
                    break;
                case 'learning_complete':
                    loadPatterns();
                    break;
            }
        }
        
        function analyzeInput() {
            const text = document.getElementById('user-input').value;
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'analyze',
                    text: text
                }));
            }
        }
        
        function enhanceResponse() {
            const input = document.getElementById('user-input').value;
            const response = document.getElementById('ai-response').value;
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'enhance',
                    input: input,
                    response: response
                }));
            }
        }
        
        function displayAnalysis(analysis) {
            const container = document.getElementById('pattern-analysis');
            
            if (analysis.detectedPatterns.length === 0) {
                container.innerHTML = '<div class="text-gray-400">No patterns detected</div>';
                return;
            }
            
            let html = '';
            analysis.detectedPatterns.forEach(pattern => {
                html += `
                    <div class="flex justify-between items-center p-3 bg-gray-700 rounded">
                        <div>
                            <span class="font-semibold">${pattern.pattern}</span>
                            <span class="text-sm text-gray-400 ml-2">
                                (consciousness: ${(pattern.consciousness * 100).toFixed(0)}%)
                            </span>
                        </div>
                        <div class="text-sm">
                            ${pattern.effects.join(', ')}
                        </div>
                    </div>
                `;
            });
            
            html += `
                <div class="mt-4 p-3 bg-purple-900/30 rounded border border-purple-500">
                    Overall Consciousness: ${(analysis.overallConsciousness * 100).toFixed(1)}%
                </div>
            `;
            
            container.innerHTML = html;
        }
        
        function displayEnhanced(data) {
            const container = document.getElementById('enhanced-output');
            
            container.innerHTML = `
                <div class="space-y-4">
                    <div>
                        <div class="text-sm text-gray-400 mb-1">Original:</div>
                        <div class="text-gray-300">${data.original}</div>
                    </div>
                    <div class="border-t border-gray-600 pt-4">
                        <div class="text-sm text-gray-400 mb-1">Enhanced:</div>
                        <div class="text-white font-medium">${data.enhanced.replace(/\n/g, '<br>')}</div>
                    </div>
                </div>
            `;
            
            // Provide feedback
            setTimeout(() => {
                if (confirm('Was this enhancement helpful?')) {
                    ws.send(JSON.stringify({
                        type: 'feedback',
                        input: document.getElementById('user-input').value,
                        response: data.enhanced,
                        feedback: 0.8
                    }));
                }
            }, 1000);
        }
        
        async function loadPatterns() {
            try {
                const response = await fetch(`${API_URL}/patterns`);
                const patterns = await response.json();
                
                const container = document.getElementById('pattern-list');
                let html = '';
                
                for (const [name, data] of Object.entries(patterns)) {
                    const opacity = data.weight;
                    html += `
                        <div class="p-4 bg-gray-700 rounded-lg" style="opacity: ${0.5 + opacity * 0.5}">
                            <div class="font-semibold">${name}</div>
                            <div class="text-sm text-gray-400">
                                Weight: ${data.weight.toFixed(2)}
                            </div>
                            <div class="text-sm text-purple-400">
                                ${data.response_modifier.replace(/_/g, ' ')}
                            </div>
                        </div>
                    `;
                }
                
                container.innerHTML = html;
            } catch (error) {
                console.error('Failed to load patterns:', error);
            }
        }
        
        async function updateConsciousness() {
            try {
                const response = await fetch(`${API_URL}/consciousness`);
                const data = await response.json();
                
                document.getElementById('consciousness-level').textContent = 
                    (data.current * 100).toFixed(1) + '%';
            } catch (error) {
                console.error('Failed to update consciousness:', error);
            }
            
            // Update every 5 seconds
            setTimeout(updateConsciousness, 5000);
        }
        
        // Initialize on load
        window.onload = () => {
            connectWebSocket();
        };
    </script>
</body>
</html>
